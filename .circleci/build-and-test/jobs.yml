  test-backend:
    executor: machine-executor
    steps:
      - checkout
      - docker-set-registry-owner
      - docker-compose-check
      - docker-compose-up-backend
      - run:
          name: Execute Python Linting Test
          command: |
            cd tdrs-backend
            docker-compose run --rm web bash -c "flake8 ."
      - run:
          name: Run Unit Tests And Create Code Coverage Report
          command: |
            cd tdrs-backend;
            docker-compose run --rm web bash -c "./wait_for_services.sh && pytest --cov-report=xml"
      - upload-codecov:
          component: backend
          coverage-report: ./tdrs-backend/coverage.xml

  test-frontend:
    executor: machine-executor
    working_directory: ~/tdp-apps
    steps:
      - checkout
      - install-nodejs-machine
      - install-yarn-packages:
          app-dir: tdrs-frontend
      - run:
          name: Run ESLint
          command: cd tdrs-frontend; yarn lint
      - run:
          name: Run Pa11y Accessibility Tests
          command: cd tdrs-frontend; mkdir pa11y-screenshots/; export NODE_OPTIONS=--openssl-legacy-provider; yarn test:accessibility
      - run:
          name: Run Jest Unit Tests
          command: cd tdrs-frontend; yarn test:ci
      - upload-codecov:
          component: frontend
          coverage-report: ./tdrs-frontend/coverage/lcov.info
      - store_artifacts:
          path: tdrs-frontend/pa11y-screenshots/

  test-e2e:
    executor: large-machine-executor
    working_directory: ~/tdp-apps
    steps:
      - checkout
      - docker-set-registry-owner
      - docker-compose-check
      - docker-compose-up-backend
      - docker-compose-up-frontend
      - install-nodejs-machine
      - install-yarn-packages:
          app-dir: tdrs-frontend
      - run:
          name: Wait for backend to become available
          command: |
            cd tdrs-backend
            docker-compose run --rm zaproxy bash -c \
              "PATH=$PATH:/home/zap/.local/bin &&
               pip install wait-for-it &&
               wait-for-it --service http://web:8080 --timeout 180 -- echo \"Django is ready\""
      - run:
          name: apply the migrations
          command: |
            cd tdrs-backend
            docker-compose exec web bash -c "python manage.py makemigrations
            python manage.py migrate"
      - run:
          name: Remove existing cypress test users
          command: |
            cd tdrs-backend
            docker-compose exec web python manage.py delete_cypress_users -usernames new-cypress@teamraft.com cypress-admin@teamraft.com
            docker-compose exec web python manage.py reset_cypress_profile_editing_users --allow-non-debug
      - run:
          name: Setup cypress test data
          command: |
            cd tdrs-backend
            docker-compose exec web python manage.py loaddata cypress/users cypress/data_files cypress/regions cypress/profile_editing_regions cypress/profile_editing_users cypress/feature_flags
      - run:
          name: Run Cypress e2e tests
          command: cd tdrs-frontend; yarn test:e2e-ci
      - store_artifacts:
          path: tdrs-frontend/cypress/screenshots/
      - store_artifacts:
          path: tdrs-frontend/cypress/videos/

  test-go-parser:
    executor: machine-executor
    working_directory: ~/tdp-apps
    environment:
      DATABASE_URL: postgres://tdpuser:something_secure@localhost:5432/tdrs_test?sslmode=disable
    steps:
      - checkout
      - docker-set-registry-owner
      - docker-compose-check
      - docker-compose-up-backend
      - restore_cache:
          keys:
            - go-parser-v1-{{ checksum "tdrs-services/parser/go.sum" }}
            - go-parser-v1-
      - run:
          name: Install Go parser CI dependencies
          command: ./scripts/install-go-parser-ci-dependencies.sh
      - save_cache:
          key: go-parser-v1-{{ checksum "tdrs-services/parser/go.sum" }}
          paths:
            - /home/circleci/go/pkg/mod
            - /home/circleci/.cache/go-build
            - /home/circleci/go/bin
      - run:
          name: Wait for Django service to become available
          command: |
            cd tdrs-backend
            docker-compose run --rm zaproxy bash -c \
              "PATH=$PATH:/home/zap/.local/bin &&
               pip install wait-for-it &&
               wait-for-it --service http://web:8080 --timeout 180 -- echo \"Django is ready\""
      - run:
          name: Compile check
          command: |
            . "$BASH_ENV"
            task parser:compile-check
      - run:
          name: Lint
          command: |
            . "$BASH_ENV"
            task parser:lint
      - run:
          name: sqlc diff
          command: |
            . "$BASH_ENV"
            task dump-parser-schema
            task parser:sqlc-diff
      - run:
          name: sqlc vet
          command: |
            . "$BASH_ENV"
            task parser:sqlc-vet
      - run:
          name: Validator compilation check
          command: |
            . "$BASH_ENV"
            task parser:validate-config
      - run:
          name: Run Go parser integration tests
          command: |
            cd tdrs-backend
            task backend-pytest-go-integration
      - run:
          name: Run Go parser tests with coverage
          command: |
            . "$BASH_ENV"
            task parser:test-all-coverage
      - run:
          name: Generate readable Go parser coverage report
          command: |
            . "$BASH_ENV"
            task parser:coverage-report
            echo ""
            echo "Go parser coverage summary"
            echo "--------------------------"
            cat tdrs-services/parser/coverage-summary.txt
      - store_artifacts:
          path: tdrs-services/parser/coverage.out
      - store_artifacts:
          path: tdrs-services/parser/coverage-summary.txt
      - store_artifacts:
          path: tdrs-services/parser/coverage.html

  secrets-check:
    executor: docker-executor
    steps:
      - checkout
      - run:
          name: "git-secrets: Scan repository for committed secrets"
          command: ./scripts/git-secrets-check.sh
      - run:
          name: "trufflehog: Scan repository for committed secrets"
          command: ./scripts/trufflehog-check.sh $CIRCLE_BRANCH
