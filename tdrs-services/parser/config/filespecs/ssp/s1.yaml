# File Specification for SSP Section 1 (Active Case Data)
#
# This file defines:
# - What format SSP Section 1 files use
# - What record types can appear in these files
# - How to identify each record type
# - How records should be grouped for processing

# =============================================================================
# BASIC IDENTIFICATION
# =============================================================================

program: SSP
section: 1
description: "SSP Active Case Data - Contains case, adult, and child records for active SSP-MOE cases"

# =============================================================================
# FILE FORMAT
# =============================================================================

# SSP files are fixed-width positional text files (UTF-8 encoded).
# Each field occupies specific byte positions within a line.
format: positional

# =============================================================================
# SCHEMAS
# =============================================================================

# List of record type schemas that can appear in this file type.
# These reference schema files in config/schemas/
schemas:
  - common/header
  - common/trailer
  - ssp/m1
  - ssp/m2
  - ssp/m3

# =============================================================================
# RECORD TYPE DETECTION
# =============================================================================

# How to determine which schema applies to each row.
# For positional files, we use prefix matching on the first characters.
record_type_detection:
  method: prefix
  prefixes:
    - prefix: "HEADER"
      schema: common/header
    - prefix: "TRAILER"
      schema: common/trailer
    - prefix: "M1"
      schema: ssp/m1
    - prefix: "M2"
      schema: ssp/m2
    - prefix: "M3"
      schema: ssp/m3

# =============================================================================
# ACCUMULATOR CONFIGURATION
# =============================================================================

# Configuration for how records are collected and grouped for processing.
#
# SSP Section 1 files contain case-level data where records with the same
# RPT_MONTH_YEAR and CASE_NUMBER belong to the same "case" and should be
# processed together. This enables case-level validation in the future.
#
# The accumulator uses key_fields to group records by composite key
# (creates RecordGroups). batch_size defaults to 1 when not specified,
# meaning each case group is dispatched individually.
#
# For SSP Section 1:
#   - key_fields is set to group by RPT_MONTH_YEAR + CASE_NUMBER
accumulator:

  # Fields to extract the grouping key from raw row data.
  # These byte positions are used BEFORE full parsing to quickly
  # determine which case a record belongs to.
  key_fields:
    fields:
      - name: rpt_month_year
        start: 2
        end: 8
      - name: case_number
        start: 8
        end: 19

  batch_size: 1

  # Sort by key_fields before accumulation so that all records for a case
  # are adjacent regardless of input order.
  presort: true

  # Which schemas participate in key-based grouping.
  # HEADER and TRAILER are excluded because they're file-level, not case-level.
  # Only M1, M2, M3 records are grouped by case.
  grouped_schemas:
    - ssp/m1
    - ssp/m2
    - ssp/m3

validation_orchestrator:
  categories:
  - id: 1
    name: Record pre-check
    default_error_type: RECORD_PRE_CHECK
  - id: 2
    name: Field validation
    default_error_type: FIELD_VALUE
  - id: 3
    name: Cross-field
    default_error_type: VALUE_CONSISTENCY
  - id: 4
    name: Group validation
    default_error_type: CASE_CONSISTENCY

# =============================================================================
# GROUP VALIDATORS (Group/Case Level)
# =============================================================================
#
# These validators run at the case/group level and validate relationships
# between records within the same case (RPT_MONTH_YEAR + CASE_NUMBER).
#
# Python equivalent: case_consistency_validator.py -> __validate_s1_records_are_related
#
# Validation rules for Section 1:
# 1. Every M1 must have at least one M2 or M3 with FAMILY_AFFILIATION == 1
# 2. Every M2 must have a corresponding M1 in the same case
# 3. Every M3 must have a corresponding M1 in the same case

group_validators:
  # M1 must have at least one M2 or M3 record
  - id: requires_related_record
    params:
      record_type: M1
      related_record_types: [M2, M3]
    message: "Every M1 record should have at least one corresponding M2 or M3 record with the same RPT_MONTH_YEAR and CASE_NUMBER"

  # M1 must have at least one M2 or M3 with FAMILY_AFFILIATION == 1
  - id: requires_related_record_with_int_value
    params:
      record_type: M1
      related_record_types: [M2, M3]
      field_name: FAMILY_AFFILIATION
      expected_value: 1
    message: "Every M1 record should have at least one corresponding M2 or M3 record with FAMILY_AFFILIATION == 1"

  # M2 records require at least one M1 record in the same case
  - id: requires_related_record
    params:
      record_type: M2
      related_record_types: [M1]
    message: "Every M2 record should have at least one corresponding M1 record with the same RPT_MONTH_YEAR and CASE_NUMBER"

  # M3 records require at least one M1 record in the same case
  - id: requires_related_record
    params:
      record_type: M3
      related_record_types: [M1]
    message: "Every M3 record should have at least one corresponding M1 record with the same RPT_MONTH_YEAR and CASE_NUMBER"

  # Federally funded recipients
  - id: federally_funded_ssn
    params:
      recipient_record_type: M2
      funding_record_type: M1
      family_affiliation_field: FAMILY_AFFILIATION
      family_affiliation_value: 1
      funding_field: FUNDING_STREAM
      funding_value: 1
      ssn_field: SSN

  # --- Exact duplicate detection ---
  - id: exact_duplicates
    params:
      record_type: M1
  - id: exact_duplicates
    params:
      record_type: M2
  - id: exact_duplicates
    params:
      record_type: M3

  # --- Partial duplicate detection ---
  - id: partial_duplicates
    params:
      record_type: M1
      fields: [RecordType, RPT_MONTH_YEAR, CASE_NUMBER]
  - id: partial_duplicates_excluding
    params:
      record_type: M2
      fields: [RecordType, RPT_MONTH_YEAR, CASE_NUMBER, FAMILY_AFFILIATION, DATE_OF_BIRTH, SSN]
      exclude_field: FAMILY_AFFILIATION
      exclude_values: [3, 5]
  - id: partial_duplicates
    params:
      record_type: M3
      fields: [RecordType, RPT_MONTH_YEAR, CASE_NUMBER, FAMILY_AFFILIATION, DATE_OF_BIRTH, SSN]
