# File Specification for TANF Section 4 (Stratum Data)
#
# This file defines:
# - What format TANF Section 4 files use
# - What record types can appear in these files
# - How to identify each record type
# - How records should be grouped for processing

# =============================================================================
# BASIC IDENTIFICATION
# =============================================================================

program: TAN
section: 4
description: "TANF Stratum Data - Contains family counts by stratum"

# =============================================================================
# FILE FORMAT
# =============================================================================

# TANF files are fixed-width positional text files (UTF-8 encoded).
# Each field occupies specific byte positions within a line.
format: positional

# =============================================================================
# SCHEMAS
# =============================================================================

# List of record type schemas that can appear in this file type.
# These reference schema files in config/schemas/
schemas:
  - common/header
  - common/trailer
  - tanf/t7

# =============================================================================
# RECORD TYPE DETECTION
# =============================================================================

# How to determine which schema applies to each row.
# For positional files, we use prefix matching on the first characters.
record_type_detection:
  method: prefix
  prefixes:
    - prefix: "HEADER"
      schema: common/header
    - prefix: "TRAILER"
      schema: common/trailer
    - prefix: "T7"
      schema: tanf/t7

# =============================================================================
# ACCUMULATOR CONFIGURATION
# =============================================================================

# Configuration for how records are collected and grouped for processing.
#
# TANF Section 4 files contain stratum data (not case-level data).
# T7 records are file-level summaries without case numbers,
# but still require grouping for dulicate checks.
accumulator:

  key_fields:
    fields:
      - name: record_type
        start: 0
        end: 2

  batch_size: 1

  grouped_schemas:
    - tanf/t7

group_validators:
  - id: exact_duplicates
    params:
      record_type: T7
