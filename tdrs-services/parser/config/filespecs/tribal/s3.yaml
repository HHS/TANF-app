# File Specification for Tribal TANF Section 3 (Aggregate Data)
#
# This file defines:
# - What format Tribal TANF Section 3 files use
# - What record types can appear in these files
# - How to identify each record type
# - How records should be grouped for processing

# =============================================================================
# BASIC IDENTIFICATION
# =============================================================================

program: TRIBAL
section: 3
description: "Tribal TANF Aggregate Data - Contains summary statistics for tribal TANF program"

# =============================================================================
# FILE FORMAT
# =============================================================================

# Tribal TANF files are fixed-width positional text files (UTF-8 encoded).
# Each field occupies specific byte positions within a line.
format: positional

# =============================================================================
# SCHEMAS
# =============================================================================

# List of record type schemas that can appear in this file type.
# These reference schema files in config/schemas/
schemas:
  - common/header
  - common/trailer
  - tribal_tanf/t6

# =============================================================================
# RECORD TYPE DETECTION
# =============================================================================

# How to determine which schema applies to each row.
# For positional files, we use prefix matching on the first characters.
record_type_detection:
  method: prefix
  prefixes:
    - prefix: "HEADER"
      schema: common/header
    - prefix: "TRAILER"
      schema: common/trailer
    - prefix: "T6"
      schema: tribal_tanf/t6

# =============================================================================
# ACCUMULATOR CONFIGURATION
# =============================================================================

# Configuration for how records are collected and grouped for processing.
#
# Tribal TANF Section 3 files contain aggregate data (not case-level data).
# T6 records are file-level summaries without case numbers,
# but still require grouping for duplicate checks.
accumulator:
  key_fields:
    fields:
      - name: record_type
        start: 0
        end: 2

  batch_size: 1

  grouped_schemas:
    - tribal_tanf/t6

group_validators:
  - id: exact_duplicates
    params:
      record_type: T6

validation_orchestrator:
  categories:
  - id: 1
    name: Record pre-check
    default_error_type: RECORD_PRE_CHECK
  - id: 2
    name: Field validation
    default_error_type: FIELD_VALUE
  - id: 3
    name: Cross-field
    default_error_type: VALUE_CONSISTENCY
  - id: 4
    name: Group validation
    default_error_type: CASE_CONSISTENCY
