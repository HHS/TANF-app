# Predefined Reusable Validators
# These validators can be referenced by ID in schemas and filespecs.
# Messages can be overridden at the use site.
#
# Validators are organized by SCOPE:
# - field: single field validation (environment: FieldEnv with Value, Params)
# - record: cross-field validation within a record (environment: RecordEnv with Get(), GetInt(), GetString(), RecordLength, Params)
# - group: cross-record validation within a case/group (environment: GroupEnv with Group, RecordCounts, HasType, getRecordsOfType(), Params)
#
# Default error types by scope (can be overridden with error_type):
# - field: FIELD_VALUE
# - record: VALUE_CONSISTENCY
# - group: CASE_CONSISTENCY
#
# Parameterized validators use Params.key to access runtime parameters.
# Example usage in schema:
#   - id: record_length_range
#     params:
#       min: 117
#       max: 156

# =============================================================================
# FIELD VALIDATORS (field scope)
# =============================================================================
# Default error_type: FIELD_VALUE

field_validators:
  # Length validator - checks string length equals n
  # Params: n (int)
  - id: length
    expr: "len(string(Value)) == Params.n"
    message: "{{.RecordType}} Item {{.Item}}: must be {{.Params.n}} characters"

  # Integer range validator - checks value is within [min, max]
  # Params: min (int), max (int)
  - id: in_range_int
    expr: "int(trim(string(Value))) >= Params.min and int(trim(string(Value))) <= Params.max"
    message: "{{.RecordType}} Item {{.Item}}: must be {{.Params.min}}-{{.Params.max}}, got {{.Value}}"

  # Discrete values validator - checks value is in allowed set
  # Params: values (array of allowed values)
  - id: in_values
    expr: "Value in Params.values"
    message: "{{.RecordType}} Item {{.Item}}: must be one of {{.Params.values}}, got {{.Value}}"

  # Equals validator - checks value equals expected
  # Params: value (any)
  - id: equals
    expr: "Value == Params.value"
    message: "{{.RecordType}} Item {{.Item}}: must be {{.Params.value}}, got {{.Value}}"

  # Value presence validators
  - id: not_empty
    expr: "isNotEmpty(Value)"
    message: "{{.RecordType}} Item {{.Item}}: value is required"

  - id: not_blank
    expr: "isNotBlank(Value)"
    message: "{{.RecordType}} Item {{.Item}}: value cannot be blank"

  # Numeric range validators
  - id: positive_value
    expr: "int(Value) > 0"
    message: "{{.RecordType}} Item {{.Item}}: must be positive, got {{.Value}}"

  - id: not_negative
    expr: "int(Value) >= 0"
    message: "{{.RecordType}} Item {{.Item}}: cannot be negative"

  # Date validators
  - id: valid_year
    expr: "year(Value) >= 1900"
    message: "{{.RecordType}} Item {{.Item}}: year must be larger than 1900"

  - id: year_after_1998
    expr: "year(Value) > 1998"
    message: "{{.RecordType}} Item {{.Item}}: year must be after 1998"

  - id: valid_day
    expr: "day(Value) >= 1 and day(Value) <= 31"
    message: "{{.RecordType}} Item {{.Item}}: day must be 1-31"

  - id: valid_month
    expr: "month(Value) >= 1 and month(Value) <= 12"
    message: "{{.RecordType}} Item {{.Item}}: month must be 1-12"

  - id: valid_date
    expr: "isValidDate(Value)"
    message: "{{.RecordType}} Item {{.Item}}: invalid date format"

  # String format validators
  - id: is_numeric
    expr: "isNumeric(string(Value))"
    message: "{{.RecordType}} Item {{.Item}}: must be numeric"

  - id: is_alphanumeric
    expr: "isAlphaNumeric(string(Value))"
    message: "{{.RecordType}} Item {{.Item}}: must be alphanumeric"

  # Values or blank validator - value must be in set or blank
  # Params: values (array of allowed values)
  - id: in_values_or_blank
    expr: "isBlank(Value) or Value in Params.values"
    message: "{{.RecordType}} Item {{.Item}}: must be one of {{.Params.values}} or blank, got {{.Value}}"

  # Education level validator - 0-16 or 98-99
  - id: education_level
    expr: "(int(trim(string(Value))) >= 0 and int(trim(string(Value))) <= 16) or (int(trim(string(Value))) >= 98 and int(trim(string(Value))) <= 99)"
    message: "{{.RecordType}} Item {{.Item}}: must be 0-16 or 98-99, got {{.Value}}"

  # Work eligible indicator validator - 0-9 or 11, 12
  - id: work_eligible_indicator
    expr: "(int(Value) >= 0 and int(Value) <= 9) or Value == '11' or Value == '12'"
    message: "{{.RecordType}} Item {{.Item}}: must be 0-9, 11, or 12, got {{.Value}}"

  # Race validator - validates race fields (0, 1, 2 or blank)
  - id: validate_race
    expr: "isBlank(Value) or int(Value) >= 0 and int(Value) <= 2"
    message: "{{.RecordType}} Item {{.Item}}: must be 0, 1, 2, or blank, got {{.Value}}"

  # Year after 2019 validator - for calendar quarter fields (T6/T7)
  - id: year_after_2019
    expr: "year(Value) > 2019"
    message: "{{.RecordType}} Item {{.Item}}: year must be after 2019"

  # Quarter validator - checks quarter portion is 1-4
  - id: quarter_is_valid
    expr: "quarter(Value) >= 1 and quarter(Value) <= 4"
    message: "{{.RecordType}} Item {{.Item}}: quarter must be 1-4"

  # Calendar quarter validator - checks YYYYQ quarter digit is 1-4
  - id: calendar_quarter_is_valid
    expr: "len(string(Value)) == 5 and int(string(Value)[4:5]) >= 1 and int(string(Value)[4:5]) <= 4"
    message: "{{.RecordType}} Item {{.Item}}: quarter must be 1-4"

  # Closure reason validator - 01-19 or 99
  - id: closure_reason
    expr: "(int(Value) >= 1 and int(Value) <= 19) or int(Value) == 99"
    message: "{{.RecordType}} Item {{.Item}}: must be 01-19 or 99, got {{.Value}}"

  # Education level validator (no zero) - 1-16 or 98-99
  # Used by M2, M3 where 0 is not a valid education level
  - id: education_level_no_zero
    expr: "(int(trim(string(Value))) >= 1 and int(trim(string(Value))) <= 16) or (int(trim(string(Value))) >= 98 and int(trim(string(Value))) <= 99)"
    message: "{{.RecordType}} Item {{.Item}}: must be 1-16 or 98-99, got {{.Value}}"

  # FRA SSN validator - matches the Python FRA validator set.
  - id: fra_ssn
    expr: "isNumeric(string(Value)) and len(string(Value)) == 9 and string(Value)[0:3] not in ['000', '666'] and string(Value)[3:5] != '00' and string(Value)[5:9] != '0000'"
    error_type: CASE_CONSISTENCY
    message: "{{.RecordType}} Item {{.Item}}: Social Security Number is not valid."

  # Tribal closure reason validator - 01-18 or 99.
  - id: tribal_closure_reason
    expr: "(int(trim(string(Value))) >= 1 and int(trim(string(Value))) <= 18) or int(trim(string(Value))) == 99"
    message: "{{.RecordType}} Item {{.Item}}: must be 01-18 or 99, got {{.Value}}"

  # =============================================================================
  # Header field validators
  # =============================================================================

  - id: header_year_range
    expr: "int(trim(string(Value))) >= 2000 and int(trim(string(Value))) <= 2099"
    message: "HEADER Item {{.Item}} ({{.FriendlyName}}): {{.Value}} is not in range [2000, 2099]."

  - id: header_quarter
    expr: "string(Value) in ['1', '2', '3', '4']"
    message: "HEADER Item {{.Item}} ({{.FriendlyName}}): {{.Value}} is not in [1, 2, 3, 4]."

  - id: header_section_type
    expr: "string(Value) in ['A', 'C', 'G', 'S']"
    message: "HEADER Item {{.Item}} ({{.FriendlyName}}): {{.Value}} is not in [A, C, G, S]."

  - id: header_fips_code
    expr: "isEmpty(Value) or isValidFIPS(string(Value))"
    message: "HEADER Item {{.Item}} ({{.FriendlyName}}): {{.Value}} is not a valid FIPS code."

  - id: header_tribe_code_range
    expr: "isTribeCodeEmpty(string(Value)) or (int(trim(string(Value))) >= 0 and int(trim(string(Value))) <= 999)"
    message: "HEADER Item {{.Item}} ({{.FriendlyName}}): {{.Value}} is not in range [0, 999]."

  - id: header_program_type
    expr: "string(Value) in ['TAN', 'SSP']"
    message: "HEADER Item {{.Item}} ({{.FriendlyName}}): {{.Value}} is not in [TAN, SSP]."

  - id: header_edit_indicator
    expr: "string(Value) in ['1', '2']"
    message: "HEADER Item {{.Item}} ({{.FriendlyName}}): {{.Value}} is not in [1, 2]."

  - id: header_encryption_indicator
    expr: "string(Value) in [' ', 'E', '']"
    message: "HEADER Item {{.Item}} ({{.FriendlyName}}): {{.Value}} is not in [ , E]."

  - id: header_update_indicator
    expr: "string(Value) == 'D'"
    message: "HEADER Update Indicator must be set to D instead of {{.Value}}. Please review Exporting Complete Data Using FTANF in the Knowledge Center."

# =============================================================================
# RECORD VALIDATORS (record scope)
# =============================================================================
# Default error_type: VALUE_CONSISTENCY
# Use error_type: RECORD_PRE_CHECK for structural validators that block record serialization

record_validators:
  # --- RECORD_PRE_CHECK validators (block record serialization) ---

  # Record length range validator
  # Params: min (int), max (int)
  - id: record_length_range
    expr: "RecordLength >= Params.min and RecordLength <= Params.max"
    error_type: RECORD_PRE_CHECK
    message: "{{.RecordType}}: record must be {{.Params.min}}-{{.Params.max}} characters, got {{.RecordLength}}"

  # Record length minimum validator
  # Params: min (int)
  - id: record_length_min
    expr: "RecordLength >= Params.min"
    error_type: RECORD_PRE_CHECK
    message: "{{.RecordType}}: record must be at least {{.Params.min}} characters, got {{.RecordLength}}"

  - id: record_has_valid_type
    expr: "isNotBlank(Get('RecordType'))"
    error_type: RECORD_PRE_CHECK
    message: "{{.RecordType}}: record type is missing or blank"

  - id: case_number_not_empty
    expr: "isNotBlank(GetString('CASE_NUMBER'))"
    error_type: RECORD_PRE_CHECK
    message: "{{.RecordType}}: case number is required and cannot be blank"

  - id: rpt_month_year_is_valid
    expr: |
      let rpt_month_year = GetString('RPT_MONTH_YEAR');
      let year_int = int(rpt_month_year[0:4]);
      let month_int = int(trimPrefix(rpt_month_year[4:], "0"));
      year_int > 1900 && month_int > 0 && month_int < 13
    error_type: RECORD_PRE_CHECK
    fields: [RPT_MONTH_YEAR]

  - id: calendar_quarter_is_valid
    expr: |
      let calendar_quarter = GetString('CALENDAR_QUARTER');
      len(calendar_quarter) == 5
        and isNumeric(calendar_quarter)
        and int(calendar_quarter[0:4]) >= 2020
        and int(calendar_quarter[4:5]) > 0
        and int(calendar_quarter[4:5]) < 5
    error_type: RECORD_PRE_CHECK
    fields: [CALENDAR_QUARTER]
    message: "{{.RecordType}}: {{.Values.CALENDAR_QUARTER}} is invalid. Calendar Quarter must be a numeric representing the Calendar Year and Quarter formatted as YYYYQ"

  - id: rpt_month_year_matches_header_year_quarter
    expr: >
      year(GetString('RPT_MONTH_YEAR')) == fiscalToCalendarYear(DataFileContext.FiscalYear, DataFileContext.FiscalQuarter)
      and string(quarter(GetString('RPT_MONTH_YEAR'))) == fiscalToCalendarQuarter(DataFileContext.FiscalYear, DataFileContext.FiscalQuarter)
    error_type: RECORD_PRE_CHECK
    fields: [RPT_MONTH_YEAR]
    message: "{{.RecordType}}: Reporting month year {{.Values.RPT_MONTH_YEAR}} does not match file reporting year:{{.DataFileContext.FiscalYear}}, quarter:{{.DataFileContext.FiscalQuarter}}."

  - id: exit_date_matches_fiscal_period
    expr: >
      year(GetString('EXIT_DATE')) == fiscalToCalendarYear(DataFileContext.FiscalYear, DataFileContext.FiscalQuarter)
      and string(quarter(GetString('EXIT_DATE'))) == fiscalToCalendarQuarter(DataFileContext.FiscalYear, DataFileContext.FiscalQuarter)
    error_type: CASE_CONSISTENCY
    fields: [EXIT_DATE]
    message: "Exit date ({{.Values.EXIT_DATE}}) is not valid. Date must be in the range of {{.DataFileContext.FiscalYear}}."

  # --- VALUE_CONSISTENCY validators (allow record serialization) ---

  # Amount requires positive field validator
  # When amount_field is positive, required_field must be positive
  # Params: amount_field (string), required_field (string)
  - id: amount_requires_positive
    expr: "GetInt(Params.amount_field) <= 0 or GetInt(Params.required_field) > 0"
    message: "When {{.Params.amount_field}} is positive, {{.Params.required_field}} must be positive"

  # Amount requires value in set validator
  # When amount_field is positive, required_field must be in values set
  # Params: amount_field (string), required_field (string), values (array)
  - id: amount_requires_value_in
    expr: "GetInt(Params.amount_field) <= 0 or GetInt(Params.required_field) in Params.values"
    message: "When {{.Params.amount_field}} is positive, {{.Params.required_field}} must be one of {{.Params.values}}"

  - id: start_before_end
    expr: "GetString('START_DATE') <= GetString('END_DATE') or isEmpty(GetString('END_DATE'))"
    message: "Start date must be before or equal to end date"
    fields: [START_DATE, END_DATE]

  # Sum validators
  - id: t1_sum_assistance_positive
    expr: "GetInt('AMT_FOOD_STAMP_ASSISTANCE') + GetInt('AMT_SUB_CC') + GetInt('CASH_AMOUNT') + GetInt('CC_AMOUNT') + GetInt('TRANSP_AMOUNT') > 0"
    message: "Sum of AMT_FOOD_STAMP_ASSISTANCE, AMT_SUB_CC, CASH_AMOUNT, CC_AMOUNT, TRANSP_AMOUNT must be greater than 0"
    fields:
      [
        AMT_FOOD_STAMP_ASSISTANCE,
        AMT_SUB_CC,
        CASH_AMOUNT,
        CC_AMOUNT,
        TRANSP_AMOUNT,
      ]

  # =============================================================================
  # Reusable ifThenAlso validators (parametrized)
  # Uses expr-lang if-else syntax for clarity
  # =============================================================================

  # If condition_field is in [condition_min, condition_max], then target_field must be in [target_min, target_max]
  # Params: condition_field, condition_min, condition_max, target_field, target_min, target_max
  - id: ifthenalso_range_to_range
    expr: "if GetInt(Params.condition_field) >= Params.condition_min and GetInt(Params.condition_field) <= Params.condition_max { GetInt(Params.target_field) >= Params.target_min and GetInt(Params.target_field) <= Params.target_max } else { true }"
    message: "If {{.Params.condition_field}} is {{.Params.condition_min}}-{{.Params.condition_max}}, {{.Params.target_field}} must be {{.Params.target_min}}-{{.Params.target_max}}"

  # If condition_field is in [condition_min, condition_max], then target_field must be in values
  # Params: condition_field, condition_min, condition_max, target_field, values
  - id: ifthenalso_range_to_values
    expr: "if GetInt(Params.condition_field) >= Params.condition_min and GetInt(Params.condition_field) <= Params.condition_max { GetInt(Params.target_field) in Params.values } else { true }"
    message: "If {{.Params.condition_field}} is {{.Params.condition_min}}-{{.Params.condition_max}}, {{.Params.target_field}} must be one of {{.Params.values}}"

  # If condition_field is in [condition_min, condition_max], then target_field must NOT be in excluded_values
  # Params: condition_field, condition_min, condition_max, target_field, excluded_values
  - id: ifthenalso_range_to_not_values
    expr: "if GetInt(Params.condition_field) >= Params.condition_min and GetInt(Params.condition_field) <= Params.condition_max { not (GetInt(Params.target_field) in Params.excluded_values) } else { true }"
    message: "If {{.Params.condition_field}} is {{.Params.condition_min}}-{{.Params.condition_max}}, {{.Params.target_field}} must not be one of {{.Params.excluded_values}}"

  # =============================================================================
  # T2 special case validators (cannot be parametrized)
  # =============================================================================

  # When FAMILY_AFFILIATION is 2-3, EDUCATION_LEVEL must be 0-16 or 98-99
  # Note: Multi-range target requires special handling
  - id: t2_family_affil_2_3_education_level
    expr: "if GetInt('FAMILY_AFFILIATION') in [2, 3] { (GetInt('EDUCATION_LEVEL') in 0..16) or (GetInt('EDUCATION_LEVEL') in 98..99) } else { true }"
    message: "If FAMILY_AFFILIATION is 2-3, EDUCATION_LEVEL must be 0-16 or 98-99"
    fields: [FAMILY_AFFILIATION, EDUCATION_LEVEL]

  # When FAMILY_AFFILIATION is 1-2, WORK_ELIGIBLE_INDICATOR must be 1-9 or 11, 12
  # Note: Values 11 and 12 are two-digit codes that need string comparison
  - id: t2_family_affil_1_2_work_eligible
    expr: "if GetInt('FAMILY_AFFILIATION') in [1, 2] { (GetInt('WORK_ELIGIBLE_INDICATOR') in 1..9) or (GetInt('WORK_ELIGIBLE_INDICATOR') in 11..12) } else { true }"
    message: "If FAMILY_AFFILIATION is 1-2, WORK_ELIGIBLE_INDICATOR must be 1-9, 11, or 12"
    fields: [FAMILY_AFFILIATION, WORK_ELIGIBLE_INDICATOR]

  # When FAMILY_AFFILIATION is 1-2, WORK_PART_STATUS must be in valid set
  # Note: WORK_PART_STATUS uses zero-padded string codes
  - id: t2_family_affil_1_2_work_part_status
    expr: "if GetInt('FAMILY_AFFILIATION') in [1, 2] { GetString('WORK_PART_STATUS') in ['01', '02', '05', '07', '09', '15', '17', '18', '19', '99'] } else { true }"
    message: "If FAMILY_AFFILIATION is 1-2, WORK_PART_STATUS must be 01, 02, 05, 07, 09, 15, 17, 18, 19, or 99"
    fields: [FAMILY_AFFILIATION, WORK_PART_STATUS]

  # Tribal TANF allows WORK_PART_STATUS 01-03, 05-09, 11-19, or 99.
  - id: tribal_t2_family_affil_1_2_work_part_status
    expr: "if GetInt('FAMILY_AFFILIATION') in [1, 2] { (GetInt('WORK_PART_STATUS') in 1..3) or (GetInt('WORK_PART_STATUS') in 5..9) or (GetInt('WORK_PART_STATUS') in 11..19) or GetString('WORK_PART_STATUS') == '99' } else { true }"
    message: "If FAMILY_AFFILIATION is 1-2, WORK_PART_STATUS must be 01-03, 05-09, 11-19, or 99"
    fields: [FAMILY_AFFILIATION, WORK_PART_STATUS]

  # When WORK_ELIGIBLE_INDICATOR is 1-5, WORK_PART_STATUS must not be 99
  - id: t2_work_eligible_1_5_work_part_not_99
    expr: "if GetInt('WORK_ELIGIBLE_INDICATOR') in 1..5 { GetString('WORK_PART_STATUS') != '99' } else { true }"
    message: "If WORK_ELIGIBLE_INDICATOR is 1-5, WORK_PART_STATUS must not be 99"
    fields: [WORK_ELIGIBLE_INDICATOR, WORK_PART_STATUS]

  # When WORK_ELIGIBLE_INDICATOR is 1-5, SSN must not be a repeating digit pattern
  - id: t2_work_eligible_1_5_ssn_valid
    expr: "if GetInt('WORK_ELIGIBLE_INDICATOR') in 1..5 { GetString('SSN') not in ['000000000', '111111111', '222222222', '333333333', '444444444', '555555555', '666666666', '777777777', '888888888', '999999999'] } else { true }"
    message: "If WORK_ELIGIBLE_INDICATOR is 1-5, SSN must not be a repeating digit"
    fields: [WORK_ELIGIBLE_INDICATOR, SSN]

  # When WORK_ELIGIBLE_INDICATOR is 11 and AGE < 19, RELATIONSHIP_HOH must not be 1
  # AGE is calculated from DATE_OF_BIRTH and RPT_MONTH_YEAR
  - id: t2_work_eligible_11_age_relationship_hoh
    expr: "if GetString('WORK_ELIGIBLE_INDICATOR') == '11' and calculateAge(GetString('DATE_OF_BIRTH'), GetString('RPT_MONTH_YEAR')) >= 0 and calculateAge(GetString('DATE_OF_BIRTH'), GetString('RPT_MONTH_YEAR')) < 19 { GetInt('RELATIONSHIP_HOH') != 1 } else { true }"
    message: "If WORK_ELIGIBLE_INDICATOR is 11 and age is less than 19, RELATIONSHIP_HOH must not be 1"
    fields: [WORK_ELIGIBLE_INDICATOR, DATE_OF_BIRTH, RELATIONSHIP_HOH]

  # =============================================================================
  # M1 special case validators (SSP)
  # =============================================================================

  # M1 sum assistance positive - SSP version uses CC_NBR_MONTHS instead of TRANSP_AMOUNT
  - id: m1_sum_assistance_positive
    expr: "GetInt('AMT_FOOD_STAMP_ASSISTANCE') + GetInt('AMT_SUB_CC') + GetInt('CASH_AMOUNT') + GetInt('CC_AMOUNT') + GetInt('CC_NBR_MONTHS') > 0"
    message: "Sum of AMT_FOOD_STAMP_ASSISTANCE, AMT_SUB_CC, CASH_AMOUNT, CC_AMOUNT, CC_NBR_MONTHS must be greater than 0"
    fields:
      [
        AMT_FOOD_STAMP_ASSISTANCE,
        AMT_SUB_CC,
        CASH_AMOUNT,
        CC_AMOUNT,
        CC_NBR_MONTHS,
      ]

  # =============================================================================
  # M2 special case validators (SSP)
  # =============================================================================

  # When FAMILY_AFFILIATION is 1-2, WORK_PART_STATUS must be in SSP valid set
  # Note: SSP includes value 16 (not in TANF T2's set) and excludes 19
  - id: m2_family_affil_1_2_work_part_status
    expr: "if GetInt('FAMILY_AFFILIATION') in [1, 2] { GetString('WORK_PART_STATUS') in ['01', '02', '05', '07', '09', '15', '16', '17', '18', '99'] } else { true }"
    message: "If FAMILY_AFFILIATION is 1-2, WORK_PART_STATUS must be 01, 02, 05, 07, 09, 15, 16, 17, 18, or 99"
    fields: [FAMILY_AFFILIATION, WORK_PART_STATUS]

  # When FAMILY_AFFILIATION is 2-3, EDUCATION_LEVEL must be 1-16 or 98-99
  # Note: SSP M2 uses range 1-16 (not 0-16 like TANF T2)
  - id: m2_family_affil_2_3_education_level
    expr: "if GetInt('FAMILY_AFFILIATION') in [2, 3] { (GetInt('EDUCATION_LEVEL') in 1..16) or (GetInt('EDUCATION_LEVEL') in 98..99) } else { true }"
    message: "If FAMILY_AFFILIATION is 2-3, EDUCATION_LEVEL must be 1-16 or 98-99"
    fields: [FAMILY_AFFILIATION, EDUCATION_LEVEL]

  # =============================================================================
  # M5 special case validators (SSP)
  # =============================================================================

  # When FAMILY_AFFILIATION is 1-3, EDUCATION_LEVEL must be 1-16 or 98-99
  # Note: M5 applies to FA 1-3 (broader than T5 which splits FA 1 and FA 2-3)
  - id: m5_family_affil_1_3_education_level
    expr: "if GetInt('FAMILY_AFFILIATION') in 1..3 { (GetInt('EDUCATION_LEVEL') in 1..16) or (GetInt('EDUCATION_LEVEL') in 98..99) } else { true }"
    message: "If FAMILY_AFFILIATION is 1-3, EDUCATION_LEVEL must be 1-16 or 98-99"
    fields: [FAMILY_AFFILIATION, EDUCATION_LEVEL]

  # =============================================================================
  # T5 special case validators
  # =============================================================================

  # When person is 18+ years old, REC_OASDI_INSURANCE must be 1-2
  # AGE is calculated from DATE_OF_BIRTH and RPT_MONTH_YEAR
  - id: t5_age_oasdi
    expr: "if calculateAge(GetString('DATE_OF_BIRTH'), GetString('RPT_MONTH_YEAR')) >= 18 { GetInt('REC_OASDI_INSURANCE') in [1, 2] } else { true }"
    message: "If age is 18 or older, REC_OASDI_INSURANCE must be 1 or 2"
    fields: [DATE_OF_BIRTH, REC_OASDI_INSURANCE]

  # =============================================================================
  # Sum-equals validator (parameterized)
  # =============================================================================
  # Validates that a total field equals the sum of component fields
  # Params: total_field (string), component_fields (array of strings)
  - id: sum_equals
    expr: "GetInt(Params.total_field) == SumFields(Params.component_fields)"
    message: "{{.Params.total_field}} must equal the sum of {{.Params.component_fields}}"

  # =============================================================================
  # Header record validators (cross-field, PRE_CHECK)
  # =============================================================================

  - id: header_record_length
    expr: "RecordLength == 23"
    error_type: PRE_CHECK
    message: "HEADER: record length is {{.RecordLength}} characters but must be 23."
    description: "RecordLength includes trailing newline (23 or 24 are both valid for a 23-char header)"

  - id: header_tribe_fips_program_agree
    expr: >
      ((GetString('program_type') == 'TAN' and (isEmpty(GetString('state_fips')) or GetString('state_fips') == '00'))
        == (not isTribeCodeEmpty(GetString('tribe_code'))))
    error_type: PRE_CHECK
    message: "Tribe Code ({{.Values.tribe_code}}) inconsistency with Program Type ({{.Values.program_type}}) and FIPS Code ({{.Values.state_fips}})."
    fields: [tribe_code, program_type, state_fips]

  - id: header_program_type_match
    expr: >
      ((not isTribeCodeEmpty(GetString('tribe_code'))) and DataFileContext.Program == 'TRIBAL')
      or (isTribeCodeEmpty(GetString('tribe_code')) and DataFileContext.Program == GetString('program_type'))
    error_type: PRE_CHECK
    message: 'Submitted program type ({{.DataFileContext.Program}}) does not match file program type ({{.FileProgram}}).'
    fields: [tribe_code, program_type]

  - id: header_section_match
    expr: >
      (GetString('type') == 'A' and DataFileContext.SectionName == 'Active Case Data')
      or (GetString('type') == 'C' and DataFileContext.SectionName == 'Closed Case Data')
      or (GetString('type') == 'G' and DataFileContext.SectionName == 'Aggregate Data')
      or (GetString('type') == 'S' and DataFileContext.SectionName == 'Stratum Data')
    error_type: PRE_CHECK
    message: "Data does not match the expected layout for {{.DataFileContext.SectionName}}."

  - id: header_fiscal_period_match
    expr: >
      GetInt('year') == fiscalToCalendarYear(DataFileContext.FiscalYear, DataFileContext.FiscalQuarter)
      and GetString('quarter') == fiscalToCalendarQuarter(DataFileContext.FiscalYear, DataFileContext.FiscalQuarter)
    error_type: PRE_CHECK
    message: "Submitted reporting year:{{.Values.year}}, quarter:Q{{.Values.quarter}} doesn't match file reporting year:{{.DataFileContext.FiscalYear}}, quarter:{{.DataFileContext.FiscalQuarter}}."
    fields: [year, quarter]

# =============================================================================
# GROUP VALIDATORS (group scope)
# =============================================================================
# Default error_type: CASE_CONSISTENCY (blocks group serialization)
# Use error_type: VALUE_CONSISTENCY with result_mode: per_record for validators that
# produce per-record errors without blocking group serialization

group_validators:
  # =============================================================================
  # Shared Group/Case Validators
  # =============================================================================

  # Max records per case - exceeding this will block the entire group from serialization
  # Params: max
  - id: max_records_per_case
    expr: "TotalRecords <= Params.max"
    error_type: CASE_CONSISTENCY
    result_mode: single
    message: "Cases must contain up to {{.Params.max}} person (Child + Adult) records within a given reporting month and year. All records associated with this case have been rejected."

  # =============================================================================
  # TANF Section 1 Group/Case Validators
  # =============================================================================

  # =============================================================================
  # Duplicate Detection Validators (per-record CASE_CONSISTENCY)
  # =============================================================================
  # These validators use per_record result mode with CASE_CONSISTENCY error type.
  # Per-record CASE_CONSISTENCY errors block the entire group from serialization.
  #
  # Exact duplicates: all field values match (uses EqualFields / slices.Equal)
  # Partial duplicates: only specified key fields match (but NOT exact duplicates)
  #
  # Python equivalent: base_parser.py:356-414 (_delete_exact_dups, _delete_partial_dups)

  # Exact duplicate detection - all non-BLANK fields match
  # Params: record_type (string) - which record type to check
  - id: exact_duplicates
    expr: "getExactDuplicates(Group, Params.record_type)"
    error_type: CASE_CONSISTENCY
    result_mode: per_record
    message: "Duplicate record detected with record type {{.RecordType}} at line {{.LineNumber}}."

  # Partial duplicate detection - specific key fields match (excludes exact dups)
  # Params: record_type (string), fields ([]string) - key fields to compare
  - id: partial_duplicates
    expr: "getPartialDuplicates(Group, Params.record_type, Params.fields)"
    error_type: CASE_CONSISTENCY
    result_mode: per_record
    message: "Partial duplicate record detected with record type {{.RecordType}} at line {{.LineNumber}}."

  # Partial duplicate detection with field exclusion (excludes exact dups)
  # Params: record_type, fields, exclude_field, exclude_values
  - id: partial_duplicates_excluding
    expr: "getPartialDuplicatesExcluding(Group, Params.record_type, Params.fields, Params.exclude_field, Params.exclude_values)"
    error_type: CASE_CONSISTENCY
    result_mode: per_record
    message: "Partial duplicate record detected with record type {{.RecordType}} at line {{.LineNumber}}."

  # =============================================================================
  # Federally funded SSN validator (group scope, per-record errors)
  # =============================================================================
  # This validator produces VALUE_CONSISTENCY errors attributed to individual records.
  # It doesn't block group serialization because these are data quality issues,
  # not structural problems.
  - id: federally_funded_ssn
    expr: |
      filter(
        getRecordsOfType(Group, Params.recipient_record_type),
        { .GetInt(Params.family_affiliation_field) == Params.family_affiliation_value and
          hasAnyRecordOfTypeWithInt(Group, Params.funding_record_type, Params.funding_field, Params.funding_value) and
          not isValidSSN(.GetString(Params.ssn_field)) }
      )
    error_type: VALUE_CONSISTENCY
    result_mode: per_record
    message: "Federally funded recipients must have a valid Social Security number."
    fields: [FUNDING_STREAM, FAMILY_AFFILIATION, SSN]

  # =============================================================================
  # Shared Group/Case Validators
  # =============================================================================

  # Record type must have at least one related record in the same case.
  # Params: record_type (string), related_record_types (array of strings)
  - id: requires_related_record
    expr: |
      filter(Group.Records, {
          .GetRecordType() == Params.record_type and not any(Params.related_record_types, { RecordCounts[#] > 0 })
        })
    message: "When {{.Params.record_type}} is present, at least one related record type must also be present"
    result_mode: per_record

  # Record type must have at least one related record with a specific int field value.
  # Params: record_type (string), related_record_types (array of strings), field_name (string), expected_value (int)
  - id: requires_related_record_with_int_value
    expr: |
      filter(Group.Records, {
          .GetRecordType() == Params.record_type and not any(Group.Records, {
              .GetRecordType() in Params.related_record_types and .GetInt(Params.field_name) == Params.expected_value
            })
        })
    message: "When {{.Params.record_type}} is present, at least one related record must have {{.Params.field_name}} == {{.Params.expected_value}}"
    result_mode: per_record
