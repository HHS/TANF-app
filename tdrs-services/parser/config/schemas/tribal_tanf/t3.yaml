      - name: EDUCATION_LEVEL
        friendly_name: Educational Level
        item: "74"
        start: 90
        end: 92
        type: string
        required: true
        field_validators:
          - id: education_level

      - name: CITIZENSHIP_STATUS
        friendly_name: Citizenship/Alienage
        item: "75"
        start: 92
        end: 93
        type: integer
        required: false
        field_validators:
          - id: in_values
            params:
              values: [1, 2, 9]

      - name: UNEARNED_SSI
        friendly_name: Amount of Unearned Income SSI
        item: "76A"
        start: 93
        end: 97
        type: string
        required: true
        field_validators:
          - id: in_range_int
            params:
