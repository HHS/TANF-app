# Tribal TANF T2 Record Schema
# Adult-level data for active Tribal TANF cases
#
# This record contains demographic, work participation, and income data
# for adults in active Tribal TANF cases.
# Note: Tribal TANF has simplified work participation fields and tribal-specific time limit fields.

record_type: T2
program: TRIBAL
section: 1
document: "Tribal TANF Active Case Data"
format: positional

# Fields shared across all segments (included in every output row)
shared:
  - name: RecordType
    friendly_name: Record Type
    item: "0"
    start: 0
    end: 2
    type: string
    required: true

  - name: RPT_MONTH_YEAR
    friendly_name: Reporting Year and Month
    item: "4"
    start: 2
    end: 8
    type: integer
    required: true

  - name: CASE_NUMBER
    friendly_name: Case Number--TANF
    item: "6"
    start: 8
    end: 19
    type: string
    required: true

# Each segment produces one output row (combined with shared fields)
segments:
  - fields:
      - name: FAMILY_AFFILIATION
        friendly_name: Family Affiliation
        item: "30"
        start: 19
        end: 20
        type: integer
        required: true

      - name: NONCUSTODIAL_PARENT
        friendly_name: Noncustodial Parent Indicator
        item: "31"
        start: 20
        end: 21
        type: integer
        required: true

      - name: DATE_OF_BIRTH
        friendly_name: Date of Birth
        item: "32"
        start: 21
        end: 29
        type: string
        required: true

      - name: SSN
        friendly_name: Social Security Number
        item: "33"
        start: 29
        end: 38
        type: string
        required: true
        transform:
          name: ssn_decrypt

      - name: RACE_HISPANIC
        friendly_name: Hispanic or Latino
        item: "34A"
        start: 38
        end: 39
        type: integer
        required: false

      - name: RACE_AMER_INDIAN
        friendly_name: American Indian or Alaska Native
