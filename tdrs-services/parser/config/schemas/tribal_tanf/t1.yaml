        item: "12"
        start: 34
        end: 35
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2, 3]

      - name: RECEIVES_SUB_HOUSING
        friendly_name: Receives Subsidized Housing
        item: "13"
