# Trailer Record Schema
# Common to all TANF/SSP/Tribal submission types
#
# The trailer record is always the last line of a data file and contains
# a count of records for validation purposes.

record_type: TRAILER
program: ALL
section: 0
document: "Trailer Record"
format: positional

# Trailer has no shared fields (single record per line)
shared: []

# Single segment containing all trailer fields
segments:
  - fields:
      - name: title
        friendly_name: Title
        item: "1"
        start: 0
        end: 7
        type: string
        required: true

      - name: record_count
        friendly_name: Record Count
        item: "2"
        start: 7
        end: 14
        type: integer
        required: true
