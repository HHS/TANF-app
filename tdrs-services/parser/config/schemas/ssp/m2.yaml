# SSP M2 Record Schema
# Adult-level data for active SSP-MOE cases
#
# This record contains demographic, work participation, and income data
# for adults in active SSP-MOE cases.

record_type: M2
program: SSP
section: 1
document: "SSP Active Case Data"
format: positional

record_validators:
  - id: record_length_min
    params:
      min: 150
  - id: case_number_not_empty
  - id: rpt_month_year_is_valid
  - id: rpt_month_year_matches_header_year_quarter
  # Cross-field validators (VALUE_CONSISTENCY)
  # Race fields when FAMILY_AFFILIATION is 1-3
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_HISPANIC
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_AMER_INDIAN
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_ASIAN
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_BLACK
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_HAWAIIAN
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_WHITE
      target_min: 1
      target_max: 2
  # MARITAL_STATUS when FAMILY_AFFILIATION is 1-3
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: MARITAL_STATUS
      target_min: 1
      target_max: 5
  # PARENT_MINOR_CHILD when FAMILY_AFFILIATION is 1-2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 2
      target_field: PARENT_MINOR_CHILD
      target_min: 1
      target_max: 3
  # EDUCATION_LEVEL when FAMILY_AFFILIATION is 2-3 (SSP: 1-16 or 98-99)
  - id: m2_family_affil_2_3_education_level
  # EDUCATION_LEVEL when FAMILY_AFFILIATION is 1 must not be 0 or 99
  - id: ifthenalso_range_to_not_values
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 1
      target_field: EDUCATION_LEVEL
      excluded_values: [0, 99]
  # CITIZENSHIP_STATUS when FAMILY_AFFILIATION is 1
  - id: ifthenalso_range_to_values
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 1
      target_field: CITIZENSHIP_STATUS
      values: [1, 2, 3]
  # COOPERATION_CHILD_SUPPORT when FAMILY_AFFILIATION is 1-3
  - id: ifthenalso_range_to_values
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: COOPERATION_CHILD_SUPPORT
      values: [1, 2, 9]
  # EMPLOYMENT_STATUS when FAMILY_AFFILIATION is 1-3
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: EMPLOYMENT_STATUS
      target_min: 1
      target_max: 3
  # WORK_ELIGIBLE_INDICATOR when FAMILY_AFFILIATION is 1-2
  - id: t2_family_affil_1_2_work_eligible
  # WORK_PART_STATUS when FAMILY_AFFILIATION is 1-2 (SSP specific values)
  - id: m2_family_affil_1_2_work_part_status
  # WORK_PART_STATUS must not be 99 when WORK_ELIGIBLE_INDICATOR is 1-5
  - id: t2_work_eligible_1_5_work_part_not_99
  # SSN must be valid when WORK_ELIGIBLE_INDICATOR is 1-5
  - id: t2_work_eligible_1_5_ssn_valid

# Fields shared across all segments (included in every output row)
shared:
  - name: RecordType
    friendly_name: Record Type
    item: "0"
    start: 0
    end: 2
    type: string
    required: true

  - name: RPT_MONTH_YEAR
    friendly_name: Reporting Month/Year
    item: "3"
    start: 2
    end: 8
    type: integer
    required: true
    field:
      - id: year_after_1998
      - id: valid_month

  - name: CASE_NUMBER
    friendly_name: Case Number
    item: "5"
    start: 8
    end: 19
    type: string
    required: true
    field:
      - id: not_empty

  - name: FIPS_CODE
    friendly_name: State FIPS Code
    item: "1"
    start: 19
    end: 21
    type: string
    required: true

# Each segment produces one output row (combined with shared fields)
segments:
  - fields:
      - name: FAMILY_AFFILIATION
        friendly_name: Family Affiliation
        item: "26"
        start: 19
        end: 20
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2, 3, 5]

      - name: NONCUSTODIAL_PARENT
        friendly_name: Noncustodial Parent Indicator
        item: "27"
        start: 20
        end: 21
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2]

      - name: DATE_OF_BIRTH
        friendly_name: Date of Birth
        item: "28"
        start: 21
        end: 29
        type: string
        required: true
        field_validators:
          - id: length
            params:
              n: 8
          - id: valid_year
          - id: valid_month
          - id: valid_day
          - id: is_numeric

      - name: SSN
        friendly_name: Social Security Number
        item: "29"
        start: 29
        end: 38
        type: string
        required: true
        transform:
          name: ssn_decrypt
        field_validators:
