# SSP M3 Record Schema
# Child-level data for active SSP-MOE cases
#
# This record contains demographic and income data for children.
# M3 records contain data for TWO children per line.
# The parser produces 1 or 2 rows depending on whether Child 2 data is present.

record_type: M3
program: SSP
section: 1
document: "SSP Active Case Data"
format: positional

record_validators:
  - id: record_length_min
    params:
      min: 60
  - id: case_number_not_empty
  - id: rpt_month_year_is_valid
  - id: rpt_month_year_matches_header_year_quarter

  # Cross-field validators (VALUE_CONSISTENCY)
  # Race fields when FAMILY_AFFILIATION is 1-2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 2
      target_field: RACE_HISPANIC
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 2
      target_field: RACE_AMER_INDIAN
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 2
      target_field: RACE_ASIAN
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 2
      target_field: RACE_BLACK
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 2
      target_field: RACE_HAWAIIAN
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 2
      target_field: RACE_WHITE
      target_min: 1
      target_max: 2
  # RELATIONSHIP_HOH when FAMILY_AFFILIATION is 1-2 (must be 4-9)
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 2
      target_field: RELATIONSHIP_HOH
      target_min: 4
      target_max: 9
  # PARENT_MINOR_CHILD when FAMILY_AFFILIATION is 1-2
  - id: ifthenalso_range_to_values
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 2
      target_field: PARENT_MINOR_CHILD
      values: [1, 2, 3]
  # EDUCATION_LEVEL when FAMILY_AFFILIATION is 1 must not be 99
  - id: ifthenalso_range_to_not_values
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 1
      target_field: EDUCATION_LEVEL
      excluded_values: [99]
  # CITIZENSHIP_STATUS when FAMILY_AFFILIATION is 1
  - id: ifthenalso_range_to_values
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 1
      target_field: CITIZENSHIP_STATUS
      values: [1, 2, 3]
  # CITIZENSHIP_STATUS when FAMILY_AFFILIATION is 2
  - id: ifthenalso_range_to_values
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 2
      condition_max: 2
      target_field: CITIZENSHIP_STATUS
      values: [1, 2, 3, 9]

# Fields shared across all segments (included in every output row)
shared:
  - name: RecordType
    friendly_name: Record Type
    item: "0"
    start: 0
    end: 2
    type: string
    required: true

  - name: RPT_MONTH_YEAR
    friendly_name: Reporting Month/Year
    item: "3"
    start: 2
    end: 8
    type: integer
    required: true
    field:
      - id: year_after_1998
      - id: valid_month

  - name: CASE_NUMBER
    friendly_name: Case Number
    item: "5"
    start: 8
    end: 19
    type: string
    required: true
    field:
      - id: not_empty

  - name: FIPS_CODE
    friendly_name: State FIPS Code
    item: "1"
    start: 19
    end: 21
    type: string
    required: true

# Each segment produces one output row (combined with shared fields)
# M3 has 2 segments: Child 1 and Child 2
segments:
  # Child 1 (always present)
  - fields:
      - name: FAMILY_AFFILIATION
        friendly_name: Family Affiliation
        item: "60"
        start: 19
        end: 20
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2, 4]

      - name: DATE_OF_BIRTH
        friendly_name: Date of Birth
        item: "61"
        start: 20
        end: 28
        type: string
        required: true
        field_validators:
          - id: length
            params:
              n: 8
          - id: valid_year
          - id: valid_month
          - id: valid_day
          - id: is_numeric

      - name: SSN
        friendly_name: Social Security Number
        item: "62"
        start: 28
        end: 37
        type: string
        required: true
        transform:
          name: ssn_decrypt
        field_validators:
          - id: is_numeric

      - name: RACE_HISPANIC
        friendly_name: Hispanic or Latino
        item: "63A"
        start: 37
        end: 38
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: RACE_AMER_INDIAN
        friendly_name: American Indian or Alaska Native
        item: "63B"
        start: 38
        end: 39
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: RACE_ASIAN
        friendly_name: Asian
        item: "63C"
        start: 39
        end: 40
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: RACE_BLACK
        friendly_name: Black or African American
        item: "63D"
        start: 40
        end: 41
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: RACE_HAWAIIAN
        friendly_name: Native Hawaiian or Pacific Islander
        item: "63E"
        start: 41
        end: 42
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: RACE_WHITE
        friendly_name: White
        item: "63F"
        start: 42
        end: 43
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: SEX
        friendly_name: Sex
        item: "64"
        start: 43
        end: 44
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 9

      - name: RECEIVE_NONSSI_BENEFITS
        friendly_name: Receives Federal Disability Benefits
        item: "65A"
        start: 44
        end: 45
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2]

      - name: RECEIVE_SSI
        friendly_name: Receives SSI or AABD
        item: "65B"
        start: 45
        end: 46
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2]

      - name: RELATIONSHIP_HOH
        friendly_name: Relationship to Head-of-Household
        item: "66"
        start: 46
        end: 48
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 10

      - name: PARENT_MINOR_CHILD
        friendly_name: Parental Status of Minor
        item: "67"
        start: 48
        end: 49
        type: integer
        required: false
        field_validators:
          - id: in_values
            params:
              values: [0, 2, 3]

      - name: EDUCATION_LEVEL
        friendly_name: Educational Level
        item: "68"
        start: 49
        end: 51
        type: string
        required: true
        field_validators:
          - id: education_level_no_zero

      - name: CITIZENSHIP_STATUS
        friendly_name: Citizenship/Immigration Status
        item: "69"
        start: 51
        end: 52
        type: integer
        required: false
        field_validators:
          - id: in_values
            params:
              values: [1, 2, 3, 9]

      - name: UNEARNED_SSI
        friendly_name: Unearned Income SSI
        item: "70A"
        start: 52
        end: 56
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 9999

      - name: OTHER_UNEARNED_INCOME
        friendly_name: Unearned Income Other
        item: "70B"
        start: 56
        end: 60
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 9999

  # Child 2 (optional - only if present in the line)
  - fields:
      - name: FAMILY_AFFILIATION
        friendly_name: Family Affiliation
        item: "60"
        start: 60
        end: 61
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2, 4]

      - name: DATE_OF_BIRTH
        friendly_name: Date of Birth
        item: "61"
        start: 61
        end: 69
        type: string
        required: true
        field_validators:
          - id: length
            params:
              n: 8
          - id: valid_year
          - id: valid_month
          - id: valid_day
          - id: is_numeric

      - name: SSN
        friendly_name: Social Security Number
        item: "62"
        start: 69
        end: 78
        type: string
        required: true
        transform:
          name: ssn_decrypt
        field_validators:
          - id: is_numeric

      - name: RACE_HISPANIC
        friendly_name: Hispanic or Latino
        item: "63A"
        start: 78
        end: 79
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: RACE_AMER_INDIAN
        friendly_name: American Indian or Alaska Native
        item: "63B"
        start: 79
        end: 80
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: RACE_ASIAN
        friendly_name: Asian
        item: "63C"
        start: 80
        end: 81
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: RACE_BLACK
        friendly_name: Black or African American
        item: "63D"
        start: 81
        end: 82
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: RACE_HAWAIIAN
        friendly_name: Native Hawaiian or Pacific Islander
        item: "63E"
        start: 82
        end: 83
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: RACE_WHITE
        friendly_name: White
        item: "63F"
        start: 83
        end: 84
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: SEX
        friendly_name: Sex
        item: "64"
        start: 84
        end: 85
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 9

      - name: RECEIVE_NONSSI_BENEFITS
        friendly_name: Receives Federal Disability Benefits
        item: "65A"
        start: 85
        end: 86
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2]

      - name: RECEIVE_SSI
        friendly_name: Receives SSI or AABD
        item: "65B"
        start: 86
        end: 87
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2]

      - name: RELATIONSHIP_HOH
        friendly_name: Relationship to Head-of-Household
        item: "66"
        start: 87
        end: 89
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 10

      - name: PARENT_MINOR_CHILD
        friendly_name: Parental Status of Minor
        item: "67"
        start: 89
        end: 90
        type: integer
        required: false
        field_validators:
          - id: in_values
            params:
              values: [0, 2, 3]

      - name: EDUCATION_LEVEL
        friendly_name: Educational Level
        item: "68"
        start: 90
        end: 92
        type: string
        required: true
        field_validators:
          - id: education_level_no_zero

      - name: CITIZENSHIP_STATUS
        friendly_name: Citizenship/Immigration Status
        item: "69"
        start: 92
        end: 93
        type: integer
        required: false
        field_validators:
          - id: in_values
            params:
              values: [1, 2, 3, 9]

      - name: UNEARNED_SSI
        friendly_name: Unearned Income SSI
        item: "70A"
        start: 93
        end: 97
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
