            params:
              min: 1
              max: 3

      - name: RECEIVES_SUB_HOUSING
        friendly_name: Receives Subsidized Housing
        item: "11"
        start: 34
        end: 35
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2]

      - name: RECEIVES_MED_ASSISTANCE
        friendly_name: Receives Medical Assistance
        item: "12"
