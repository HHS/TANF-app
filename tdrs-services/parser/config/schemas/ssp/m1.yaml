# SSP M1 Record Schema
# Case-level data for active SSP-MOE cases
#
# This record contains family composition, benefits, and sanction information.
# One M1 record exists per case per reporting month.

record_type: M1
program: SSP
section: 1
document: "SSP Active Case Data"
format: positional

record_validators:
  # Record validators with RECORD_PRE_CHECK error type (block record serialization)
  - id: record_length_min
    params:
      min: 113
  - id: case_number_not_empty
  - id: rpt_month_year_is_valid
  - id: rpt_month_year_matches_header_year_quarter

  # Record validators with VALUE_CONSISTENCY error type (cross-field validation)
  # Amount requires positive validators
  - id: amount_requires_positive
    params:
      amount_field: CASH_AMOUNT
      required_field: NBR_MONTHS
  - id: amount_requires_positive
    params:
      amount_field: CC_AMOUNT
      required_field: CHILDREN_COVERED
  - id: amount_requires_positive
    params:
      amount_field: CC_AMOUNT
      required_field: CC_NBR_MONTHS
  - id: amount_requires_positive
    params:
      amount_field: TRANSP_AMOUNT
      required_field: TRANSP_NBR_MONTHS
  # Sanction reduction amount validators
  - id: amount_requires_value_in
    params:
      amount_field: SANC_REDUCTION_AMT
      required_field: WORK_REQ_SANCTION
      values: [1, 2]
  - id: amount_requires_value_in
    params:
      amount_field: SANC_REDUCTION_AMT
      required_field: SANC_TEEN_PARENT
      values: [1, 2]
  - id: amount_requires_value_in
    params:
      amount_field: SANC_REDUCTION_AMT
      required_field: NON_COOPERATION_CSE
      values: [1, 2]
  - id: amount_requires_value_in
    params:
      amount_field: SANC_REDUCTION_AMT
      required_field: FAILURE_TO_COMPLY
      values: [1, 2]
  - id: amount_requires_value_in
    params:
      amount_field: SANC_REDUCTION_AMT
      required_field: OTHER_SANCTION
      values: [1, 2]
  # Other total reductions validators
  - id: amount_requires_value_in
    params:
      amount_field: OTHER_TOTAL_REDUCTIONS
      required_field: FAMILY_CAP
      values: [1, 2]
  - id: amount_requires_value_in
    params:
      amount_field: OTHER_TOTAL_REDUCTIONS
      required_field: REDUCTIONS_ON_RECEIPTS
      values: [1, 2]
  - id: amount_requires_value_in
    params:
      amount_field: OTHER_TOTAL_REDUCTIONS
      required_field: OTHER_NON_SANCTION
      values: [1, 2]
  # Sum validator (SSP M1 specific - uses CC_NBR_MONTHS not TRANSP_AMOUNT)
  - id: m1_sum_assistance_positive

# Fields shared across all segments (included in every output row)
shared:
  - name: RecordType
    friendly_name: Record Type
    item: "0"
    start: 0
    end: 2
    type: string
    required: true

  - name: RPT_MONTH_YEAR
    friendly_name: Reporting Month/Year
    item: "3"
    start: 2
    end: 8
    type: integer
    required: true
    field:
      - id: year_after_1998
      - id: valid_month

  - name: CASE_NUMBER
    friendly_name: Case Number
    item: "5"
    start: 8
    end: 19
    type: string
    required: true
    field:
      - id: not_empty

# Each segment produces one output row (combined with shared fields)
segments:
  - fields:
      - name: COUNTY_FIPS_CODE
        friendly_name: County FIPS Code
        item: "2"
        start: 19
        end: 22
        type: string
        required: true
        transform:
          name: zero_pad
          params:
            digits: 3
        field_validators:
          - id: is_numeric

      - name: STRATUM
        friendly_name: Stratum
        item: "4"
        start: 22
        end: 24
        type: string
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 99

      - name: ZIP_CODE
        friendly_name: ZIP Code
        item: "6"
        start: 24
        end: 29
        type: string
        required: true
        field_validators:
          - id: is_numeric

      - name: DISPOSITION
        friendly_name: Disposition
        item: "7"
        start: 29
        end: 30
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2]

      - name: NBR_FAMILY_MEMBERS
        friendly_name: Number of Family Members
        item: "8"
        start: 30
        end: 32
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 1
              max: 99

      - name: FAMILY_TYPE
        friendly_name: Type of Family for Work Participation
        item: "9"
        start: 32
        end: 33
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 1
              max: 3

      - name: TANF_ASST_IN_6MONTHS
        friendly_name: Received TANF Assistance in Past 6 Months
        item: "10"
        start: 33
        end: 34
        type: integer
        required: true
