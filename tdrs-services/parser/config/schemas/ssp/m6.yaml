# SSP M6 Record Schema
# Aggregate data for SSP-MOE (Section 3)
#
# This record contains aggregate counts and totals for a calendar quarter.
# Each M6 record has data for 3 months (A, B, C) in separate column positions.
# The parser should produce 3 output rows from each M6 record line.

record_type: M6
program: SSP
section: 3
document: "SSP Aggregate Data"
format: positional

# Record validators
record_validators:
  - id: record_length_min
    params:
      min: 259
  - id: rpt_month_year_matches_header_year_quarter
  - id: calendar_quarter_is_valid
    error_type: RECORD_PRE_CHECK

  # SSPMOE_FAMILIES must equal sum of 2-parent + 1-parent + no-parent families
  - id: sum_equals
    params:
      total_field: SSPMOE_FAMILIES
      component_fields: [NUM_2_PARENTS, NUM_1_PARENTS, NUM_NO_PARENTS]
  # NUM_RECIPIENTS must equal sum of adult + child recipients
  - id: sum_equals
    params:
      total_field: NUM_RECIPIENTS
      component_fields: [ADULT_RECIPIENTS, CHILD_RECIPIENTS]

# Fields shared across all segments (included in every output row)
shared:
  - name: RecordType
    friendly_name: Record Type
    item: "0"
    start: 0
    end: 2
    type: string
    required: true

  - name: CALENDAR_QUARTER
    friendly_name: Calendar Quarter
    item: "2"
    start: 2
    end: 7
    type: integer
    required: true
    field:
      - id: year_after_2019
      - id: quarter_is_valid

# Each segment produces one output row (combined with shared fields)
# M6 has 3 segments: Month A, Month B, Month C
segments:
  # Month A (first month of quarter)
  - fields:
      - name: RPT_MONTH_YEAR
        friendly_name: Reporting Month/Year
        item: "2B"
        type: integer
        required: true
        source_field: CALENDAR_QUARTER
        transform:
          name: calendar_quarter_to_month
          params:
            month_index: 0

      - name: SSPMOE_FAMILIES
        friendly_name: SSP-MOE Families
        item: "3A"
        start: 7
        end: 15
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 99999999

      - name: NUM_2_PARENTS
        friendly_name: SSP-MOE Two-Parent Families
        item: "4A"
        start: 31
        end: 39
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 99999999

      - name: NUM_1_PARENTS
        friendly_name: SSP-MOE One-Parent Families
        item: "5A"
        start: 55
        end: 63
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 99999999

      - name: NUM_NO_PARENTS
        friendly_name: SSP-MOE No-Parent Families
        item: "6A"
        start: 79
        end: 87
        type: integer
        required: true
        field_validators:
