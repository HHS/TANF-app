# SSP M5 Record Schema
# Adult-level data for closed SSP-MOE cases
#
# This record contains demographic and income data for adults
# in closed SSP-MOE cases.

record_type: M5
program: SSP
section: 2
document: "SSP Closed Case Data"
format: positional

# Record validators with RECORD_PRE_CHECK error type (block record serialization)
record_validators:
  - id: record_length_min
    params:
      min: 66
  - id: case_number_not_empty
  - id: rpt_month_year_is_valid
  - id: rpt_month_year_matches_header_year_quarter

  # Record validators with VALUE_CONSISTENCY error type (cross-field validation)
  # Race fields when FAMILY_AFFILIATION is 1-3
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_HISPANIC
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_AMER_INDIAN
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_ASIAN
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_BLACK
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_HAWAIIAN
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_WHITE
      target_min: 1
      target_max: 2
  # MARITAL_STATUS when FAMILY_AFFILIATION is 1-3
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: MARITAL_STATUS
      target_min: 1
      target_max: 5
  # PARENT_MINOR_CHILD when FAMILY_AFFILIATION is 1-2 (M5: 1-2, not 1-3 like T5)
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 2
      target_field: PARENT_MINOR_CHILD
      target_min: 1
      target_max: 2
  # EDUCATION_LEVEL when FAMILY_AFFILIATION is 1-3 must be 1-16 or 98-99
  - id: m5_family_affil_1_3_education_level
  # CITIZENSHIP_STATUS when FAMILY_AFFILIATION is 1
  - id: ifthenalso_range_to_values
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 1
      target_field: CITIZENSHIP_STATUS
      values: [1, 2, 3]
  # REC_OASDI_INSURANCE when age >= 18
  - id: t5_age_oasdi
  # REC_FEDERAL_DISABILITY when FAMILY_AFFILIATION is 1
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 1
      target_field: REC_FEDERAL_DISABILITY
      target_min: 1
      target_max: 2

# Fields shared across all segments (included in every output row)
shared:
  - name: RecordType
    friendly_name: Record Type
    item: "0"
    start: 0
    end: 2
    type: string
    required: true

  - name: RPT_MONTH_YEAR
    friendly_name: Reporting Month/Year
    item: "3"
    start: 2
    end: 8
    type: integer
    required: true
    field:
      - id: year_after_1998
      - id: valid_month

  - name: CASE_NUMBER
    friendly_name: Case Number
    item: "5"
    start: 8
    end: 19
    type: string
    required: true
    field:
      - id: not_empty

# Each segment produces one output row (combined with shared fields)
segments:
  - fields:
      - name: FAMILY_AFFILIATION
        friendly_name: Family Affiliation
        item: "13"
        start: 19
        end: 20
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 1
              max: 5

      - name: DATE_OF_BIRTH
        friendly_name: Date of Birth
        item: "14"
        start: 20
        end: 28
        type: string
        required: true
        field_validators:
          - id: length
            params:
              n: 8
          - id: valid_year
          - id: valid_month
          - id: valid_day
          - id: is_numeric

      - name: SSN
        friendly_name: Social Security Number
        item: "15"
        start: 28
        end: 37
        type: string
        required: true
        transform:
          name: ssn_decrypt
        field_validators:
          - id: is_numeric

      - name: RACE_HISPANIC
        friendly_name: Hispanic or Latino
        item: "16A"
        start: 37
        end: 38
        type: integer
        required: false
        field_validators:
          - id: validate_race

      - name: RACE_AMER_INDIAN
        friendly_name: American Indian or Alaska Native
        item: "16B"
        start: 38
        end: 39
        type: integer
        required: false
        field_validators:
          - id: validate_race

      - name: RACE_ASIAN
        friendly_name: Asian
        item: "16C"
        start: 39
        end: 40
        type: integer
        required: false
        field_validators:
          - id: validate_race

      - name: RACE_BLACK
        friendly_name: Black or African American
        item: "16D"
        start: 40
        end: 41
        type: integer
        required: false
        field_validators:
          - id: validate_race

      - name: RACE_HAWAIIAN
        friendly_name: Native Hawaiian or Pacific Islander
        item: "16E"
        start: 41
        end: 42
        type: integer
        required: false
        field_validators:
          - id: validate_race

      - name: RACE_WHITE
        friendly_name: White
        item: "16F"
        start: 42
        end: 43
        type: integer
        required: false
        field_validators:
          - id: validate_race

      - name: SEX
        friendly_name: Sex
        item: "17"
        start: 43
        end: 44
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 9

      - name: REC_OASDI_INSURANCE
        friendly_name: "Received Disability Benefits: OASDI Program"
        item: "18A"
        start: 44
        end: 45
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: REC_FEDERAL_DISABILITY
        friendly_name: Received Federal Disability
        item: "18B"
        start: 45
        end: 46
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: REC_AID_TOTALLY_DISABLED
        friendly_name: Received Aid Totally Disabled
        item: "18C"
        start: 46
        end: 47
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: REC_AID_AGED_BLIND
        friendly_name: Received Aid Aged Blind
        item: "18D"
        start: 47
        end: 48
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: REC_SSI
        friendly_name: Received SSI
        item: "18E"
        start: 48
        end: 49
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2]

      - name: MARITAL_STATUS
        friendly_name: Marital Status
        item: "19"
        start: 49
        end: 50
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 5

      - name: RELATIONSHIP_HOH
        friendly_name: Relationship to Head-of-Household
        item: "20"
        start: 50
        end: 52
        type: string
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 1
              max: 10

      - name: PARENT_MINOR_CHILD
        friendly_name: Parent with Minor Child in the Family
        item: "21"
        start: 52
        end: 53
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 2

      - name: NEEDS_OF_PREGNANT_WOMAN
        friendly_name: Needs of a Pregnant Woman
        item: "22"
        start: 53
        end: 54
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 9

      - name: EDUCATION_LEVEL
        friendly_name: Educational Level
        item: "23"
        start: 54
        end: 56
        type: string
        required: false
        field_validators:
          - id: education_level

      - name: CITIZENSHIP_STATUS
        friendly_name: Citizenship/Immigration Status
        item: "24"
        start: 56
        end: 57
        type: integer
        required: false
        field_validators:
          - id: in_values
            params:
              values: [1, 2, 3, 9]

      - name: EMPLOYMENT_STATUS
        friendly_name: Employment Status
        item: "25"
        start: 57
        end: 58
        type: integer
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 3

      - name: AMOUNT_EARNED_INCOME
        friendly_name: Amount of Earned Income
        item: "26"
        start: 58
        end: 62
        type: string
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 9999

      - name: AMOUNT_UNEARNED_INCOME
        friendly_name: Amount of Unearned Income
        item: "27"
        start: 62
        end: 66
        type: string
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 9999
