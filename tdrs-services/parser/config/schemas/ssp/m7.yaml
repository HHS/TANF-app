# SSP M7 Record Schema
# Stratum data for SSP-MOE (Section 4)
#
# This record contains family counts by stratum for a calendar quarter.
# Each M7 record has data for 10 strata, with each stratum having 3 months (A, B, C).
# The parser produces 30 output rows from each M7 record line (10 strata × 3 months).

record_type: M7
program: SSP
section: 4
document: "SSP Stratum Data"
format: positional

record_validators:
  - id: record_length_min
    params:
      min: 247
  - id: rpt_month_year_matches_header_year_quarter
  - id: calendar_quarter_is_valid
    error_type: RECORD_PRE_CHECK

# Fields shared across all segments (included in every output row)
shared:
  - name: RecordType
    friendly_name: Record Type
    item: "0"
    start: 0
    end: 2
    type: string
    required: true

  - name: CALENDAR_QUARTER
    friendly_name: Calendar Quarter
    item: "2"
    start: 2
    end: 7
    type: integer
    required: true
    field:
      - id: year_after_2019
      - id: quarter_is_valid

# Each segment produces one output row (combined with shared fields)
# M7 has 30 segments: 10 strata × 3 months (A, B, C)
segments:
  # Stratum 1, Month A
  - fields:
      - name: RPT_MONTH_YEAR
        friendly_name: Reporting Month/Year
        item: "2A"
        type: integer
        required: true
        source_field: CALENDAR_QUARTER
        transform:
          name: calendar_quarter_to_month
          params:
            month_index: 0

      - name: TDRS_SECTION_IND
        friendly_name: SDR Section Indicator
        item: "3"
        start: 7
        end: 8
        type: string
        required: true
        field_validators:
          - id: in_values
            params:
              values: ["1", "2"]

      - name: STRATUM
        friendly_name: Stratum
        item: "4"
        start: 8
        end: 10
        type: string
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 99

      - name: FAMILIES_MONTH
        friendly_name: Number of Families
        item: "5A"
        start: 10
        end: 17
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 9999999

  # Stratum 1, Month B
  - fields:
      - name: RPT_MONTH_YEAR
        friendly_name: Reporting Month/Year
