# SSP M4 Record Schema
# Case-level data for closed SSP-MOE cases
#
# This record contains case closure information including reason for closure
# and benefits received at closure. One M4 record exists per closed case.

record_type: M4
program: SSP
section: 2
document: "SSP Closed Case Data"
format: positional

# Record validators with RECORD_PRE_CHECK error type (block record serialization)
record_validators:
  - id: record_length_min
    params:
      min: 34
  - id: case_number_not_empty
  - id: rpt_month_year_is_valid
  - id: rpt_month_year_matches_header_year_quarter

# Fields shared across all segments (included in every output row)
shared:
  - name: RecordType
    friendly_name: Record Type
    item: "0"
    start: 0
    end: 2
    type: string
    required: true

  - name: RPT_MONTH_YEAR
    friendly_name: Reporting Month/Year
    item: "3"
    start: 2
    end: 8
    type: integer
    required: true
    field:
      - id: year_after_1998
      - id: valid_month

  - name: CASE_NUMBER
    friendly_name: Case Number
    item: "5"
    start: 8
    end: 19
    type: string
    required: true
    field:
      - id: not_empty

# Each segment produces one output row (combined with shared fields)
segments:
  - fields:
      - name: COUNTY_FIPS_CODE
        friendly_name: County FIPS Code
        item: "2"
        start: 19
        end: 22
        type: string
        required: true
        transform:
          name: zero_pad
          params:
            digits: 3
        field_validators:
          - id: is_numeric

      - name: STRATUM
        friendly_name: Stratum
        item: "4"
        start: 22
        end: 24
        type: string
        required: false
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 99

      - name: ZIP_CODE
        friendly_name: ZIP Code
        item: "6"
        start: 24
        end: 29
        type: string
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 99999

      - name: DISPOSITION
        friendly_name: Disposition
        item: "7"
        start: 29
        end: 30
        type: integer
        required: true
        field_validators:
          - id: equals
            params:
              value: 1

      - name: CLOSURE_REASON
        friendly_name: Reason for Closure
        item: "8"
        start: 30
        end: 32
        type: string
        required: true
        field_validators:
          - id: closure_reason

      - name: REC_SUB_HOUSING
        friendly_name: Received Subsidized Housing
        item: "9"
        start: 32
        end: 33
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2]

      - name: REC_MED_ASSIST
        friendly_name: Received Medical Assistance
        item: "10"
        start: 33
        end: 34
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2]

      - name: REC_FOOD_STAMPS
        friendly_name: Received SNAP Assistance
        item: "11"
        start: 34
        end: 35
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2]

      - name: REC_SUB_CC
        friendly_name: Received Subsidized Child Care
        item: "12"
        start: 35
        end: 36
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2]
