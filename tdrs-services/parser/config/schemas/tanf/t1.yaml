      - name: REDUCTIONS_ON_RECEIPTS
        friendly_name: Reductions on Receipts
        item: "26CIII"
        start: 111
        end: 112
        type: integer
        required: true
        field_validators:
          - id: in_values
            params:
              values: [1, 2]

      - name: OTHER_NON_SANCTION
