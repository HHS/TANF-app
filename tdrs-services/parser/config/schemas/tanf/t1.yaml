        end: 78
        type: integer
        required: true
        field_validators:
          - id: not_negative

      - name: TRANSITION_SERVICES_AMOUNT
        friendly_name: Transition Services Amount
        item: "24A"
        start: 78
        end: 82
        type: integer
        required: false
        field_validators:
          - id: not_negative

      - name: TRANSITION_NBR_MONTHS
        friendly_name: Number of Months (Transition)
        item: "24B"
        start: 82
        end: 85
        type: integer
        required: false
        field_validators:
          - id: not_negative

      - name: OTHER_AMOUNT
        friendly_name: Other Amount
        item: "25A"
        start: 85
        end: 89
