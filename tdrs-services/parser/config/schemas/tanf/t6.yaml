# TANF T6 Record Schema
# Aggregate data for TANF (Section 3)
#
# This record contains aggregate counts and totals for a calendar quarter.
# Each T6 record has data for 3 months (A, B, C) in separate column positions.
# The parser should produce 3 output rows from each T6 record line.

record_type: T6
program: TAN
section: 3
document: "TANF Aggregate Data"
format: positional

# Record validators
record_validators:
  - id: record_length_min
    params:
      min: 379
  - id: rpt_month_year_matches_header_year_quarter
  - id: calendar_quarter_is_valid
    error_type: RECORD_PRE_CHECK

  # Sum validators
  - id: sum_equals
    params:
      total_field: NUM_APPLICATIONS
      component_fields: [NUM_APPROVED, NUM_DENIED]
  - id: sum_equals
    params:
      total_field: NUM_FAMILIES
      component_fields: [NUM_2_PARENTS, NUM_1_PARENTS, NUM_NO_PARENTS]
  - id: sum_equals
    params:
      total_field: NUM_RECIPIENTS
      component_fields: [NUM_ADULT_RECIPIENTS, NUM_CHILD_RECIPIENTS]

# Fields shared across all segments (included in every output row)
shared:
  - name: RecordType
    friendly_name: Record Type
    item: "0"
    start: 0
    end: 2
    type: string
    required: true

  - name: CALENDAR_QUARTER
    friendly_name: Calendar Quarter
    item: "3"
    start: 2
    end: 7
    type: integer
    required: true
    field:
      - id: year_after_2019
      - id: quarter_is_valid

# Each segment produces one output row (combined with shared fields)
# T6 has 3 segments: Month A, Month B, Month C
segments:
  # Month A (first month of quarter)
  - fields:
      - name: RPT_MONTH_YEAR
        friendly_name: Reporting Month/Year
        item: "4"
        type: integer
        required: true
        source_field: CALENDAR_QUARTER
        transform:
          name: calendar_quarter_to_month
          params:
            month_index: 0

      - name: NUM_APPLICATIONS
        friendly_name: Total Number of Applications
        item: "4A"
        start: 7
        end: 15
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 99999999

      - name: NUM_APPROVED
        friendly_name: Total Number of Approved Applications
        item: "5A"
        start: 31
        end: 39
        type: integer
        required: true
        field_validators:
          - id: in_range_int
            params:
              min: 0
              max: 99999999

      - name: NUM_DENIED
        friendly_name: Total Number of Denied Applications
        item: "6A"
        start: 55
        end: 63
        type: integer
        required: true
