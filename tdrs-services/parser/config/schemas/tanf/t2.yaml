# TANF T2 Record Schema
# Adult-level data for active TANF cases
#
# This record contains individual adult information including demographics,
# work participation, and income. One T2 record exists per adult per case.

record_type: T2
program: TAN
section: 1
document: "TANF Active Case Data"
format: positional

# Record validators with RECORD_PRE_CHECK error type (block record serialization)
record_validators:
  - id: record_length_min
    params:
      min: 156
  - id: case_number_not_empty
  - id: rpt_month_year_is_valid
  - id: rpt_month_year_matches_header_year_quarter

  # Record validators with VALUE_CONSISTENCY error type (cross-field validation)
  # Race fields when FAMILY_AFFILIATION is 1-3
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_HISPANIC
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_AMER_INDIAN
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_ASIAN
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_BLACK
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_HAWAIIAN
      target_min: 1
      target_max: 2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: RACE_WHITE
      target_min: 1
      target_max: 2
  # MARITAL_STATUS when FAMILY_AFFILIATION is 1-3
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: MARITAL_STATUS
      target_min: 1
      target_max: 5
  # PARENT_MINOR_CHILD when FAMILY_AFFILIATION is 1-2
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 2
      target_field: PARENT_MINOR_CHILD
      target_min: 1
      target_max: 3
  - id: t2_family_affil_2_3_education_level
  - id: ifthenalso_range_to_not_values
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 1
      target_field: EDUCATION_LEVEL
      excluded_values: [0, 99]
  - id: ifthenalso_range_to_values
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 1
      target_field: CITIZENSHIP_STATUS
      values: [1, 2, 3]
  - id: ifthenalso_range_to_values
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: COOPERATION_CHILD_SUPPORT
      values: [1, 2, 9]
  # EMPLOYMENT_STATUS when FAMILY_AFFILIATION is 1-3
  - id: ifthenalso_range_to_range
    params:
      condition_field: FAMILY_AFFILIATION
      condition_min: 1
      condition_max: 3
      target_field: EMPLOYMENT_STATUS
      target_min: 1
      target_max: 3
  - id: t2_family_affil_1_2_work_eligible
  - id: t2_family_affil_1_2_work_part_status
  - id: t2_work_eligible_1_5_work_part_not_99
  - id: t2_work_eligible_1_5_ssn_valid
  - id: t2_work_eligible_11_age_relationship_hoh

# Fields shared across all segments (included in every output row)
shared:
  - name: RecordType
    friendly_name: Record Type
    item: "0"
    start: 0
    end: 2
    type: string
    required: true

  - name: RPT_MONTH_YEAR
    friendly_name: Reporting Month/Year
    item: "4"
    start: 2
    end: 8
    type: string
    required: true
    field:
      - id: year_after_1998
      - id: valid_month

  - name: CASE_NUMBER
    friendly_name: Case Number
    item: "6"
    start: 8
    end: 19
    type: string
    required: true
    field:
      - id: not_empty

# Each segment produces one output row (combined with shared fields)
