# Predefined Reusable Validators
# These validators can be referenced by ID in schemas and filespecs.
# Messages can be overridden at the use site.
#
# Parameterized validators use Params.key to access runtime parameters.
# Example usage in schema:
#   - id: record_length_range
#     params:
#       min: 117
#       max: 156

category1:
  # Record length range validator
  # Params: min (int), max (int)
  - id: record_length_range
    expr: "RecordLength >= Params.min and RecordLength <= Params.max"
    message: "{{.RecordType}}: record must be {{.Params.min}}-{{.Params.max}} characters, got {{.RecordLength}}"

  # Record length minimum validator
  # Params: min (int)
  - id: record_length_min
    expr: "RecordLength >= Params.min"
    message: "{{.RecordType}}: record must be at least {{.Params.min}} characters, got {{.RecordLength}}"

  - id: record_has_valid_type
    expr: "isNotBlank(Get('RecordType'))"
    message: "{{.RecordType}}: record type is missing or blank"

  - id: case_number_not_empty
    expr: "isNotBlank(GetString('CASE_NUMBER'))"
    message: "{{.RecordType}}: case number is required and cannot be blank"

category2:
  # Length validator - checks string length equals n
  # Params: n (int)
  - id: length
    expr: "len(Value) == Params.n"
    message: "{{.RecordType}} Item {{.Item}}: must be {{.Params.n}} characters"

  # Integer range validator - checks value is within [min, max]
  # Params: min (int), max (int)
  - id: in_range_int
    expr: "int(Value) >= Params.min and int(Value) <= Params.max"
    message: "{{.RecordType}} Item {{.Item}}: must be {{.Params.min}}-{{.Params.max}}, got {{.Value}}"

  # Discrete values validator - checks value is in allowed set
  # Params: values (array of allowed values)
  - id: in_values
    expr: "Value in Params.values"
    message: "{{.RecordType}} Item {{.Item}}: must be one of {{.Params.values}}, got {{.Value}}"

  # Equals validator - checks value equals expected
  # Params: value (any)
  - id: equals
    expr: "Value == Params.value"
    message: "{{.RecordType}} Item {{.Item}}: must be {{.Params.value}}, got {{.Value}}"

  # Value presence validators
  - id: not_empty
    expr: "isNotEmpty(Value)"
    message: "{{.RecordType}} Item {{.Item}}: value is required"

  - id: not_blank
    expr: "isNotBlank(Value)"
    message: "{{.RecordType}} Item {{.Item}}: value cannot be blank"

  # Numeric range validators
  - id: positive_value
    expr: "int(Value) > 0"
    message: "{{.RecordType}} Item {{.Item}}: must be positive, got {{.Value}}"

  - id: not_negative
    expr: "int(Value) >= 0"
    message: "{{.RecordType}} Item {{.Item}}: cannot be negative"

  # Date validators
  - id: valid_year
    expr: "year(Value) >= 1900 and year(Value) <= 2100"
    message: "{{.RecordType}} Item {{.Item}}: year must be 1900-2100"

  - id: year_after_1998
    expr: "year(Value) > 1998"
    message: "{{.RecordType}} Item {{.Item}}: year must be after 1998"

  - id: valid_month
    expr: "month(Value) >= 1 and month(Value) <= 12"
    message: "{{.RecordType}} Item {{.Item}}: month must be 1-12"

  - id: valid_date
    expr: "isValidDate(Value)"
    message: "{{.RecordType}} Item {{.Item}}: invalid date format"

  # String format validators
  - id: is_numeric
    expr: "isNumeric(str(Value))"
    message: "{{.RecordType}} Item {{.Item}}: must be numeric"

  - id: is_alphanumeric
    expr: "isAlphaNumeric(str(Value))"
    message: "{{.RecordType}} Item {{.Item}}: must be alphanumeric"

  # Values or blank validator - value must be in set or blank
  # Params: values (array of allowed values)
  - id: in_values_or_blank
    expr: "isBlank(Value) or Value in Params.values"
    message: "{{.RecordType}} Item {{.Item}}: must be one of {{.Params.values}} or blank, got {{.Value}}"

  # Education level validator - 0-16 or 98-99
  - id: education_level
    expr: "(int(Value) >= 0 and int(Value) <= 16) or (int(Value) >= 98 and int(Value) <= 99)"
    message: "{{.RecordType}} Item {{.Item}}: must be 0-16 or 98-99, got {{.Value}}"

  # Work eligible indicator validator - 0-9 or 11, 12
  - id: work_eligible_indicator
    expr: "(int(Value) >= 0 and int(Value) <= 9) or Value == '11' or Value == '12'"
    message: "{{.RecordType}} Item {{.Item}}: must be 0-9, 11, or 12, got {{.Value}}"

  # Race validator - validates race fields (0, 1, 2 or blank)
  - id: validate_race
    expr: "isBlank(Value) or int(Value) >= 0 and int(Value) <= 2"
    message: "{{.RecordType}} Item {{.Item}}: must be 0, 1, 2, or blank, got {{.Value}}"

category3:
  # Amount requires positive field validator
  # When amount_field is positive, required_field must be positive
  # Params: amount_field (string), required_field (string)
  # Note: fields array must be specified at use-site for dependency tracking
  - id: amount_requires_positive
    expr: "GetInt(Params.amount_field) <= 0 or GetInt(Params.required_field) > 0"
    message: "When {{.Params.amount_field}} is positive, {{.Params.required_field}} must be positive"

  # Amount requires value in set validator
  # When amount_field is positive, required_field must be in values set
  # Params: amount_field (string), required_field (string), values (array)
  # Note: fields array must be specified at use-site for dependency tracking
  - id: amount_requires_value_in
    expr: "GetInt(Params.amount_field) <= 0 or GetInt(Params.required_field) in Params.values"
    message: "When {{.Params.amount_field}} is positive, {{.Params.required_field}} must be one of {{.Params.values}}"

  - id: start_before_end
    expr: "GetString('START_DATE') <= GetString('END_DATE') or isEmpty(GetString('END_DATE'))"
    message: "Start date must be before or equal to end date"
    fields: [START_DATE, END_DATE]

  # Sum validators
  - id: t1_sum_assistance_positive
    expr: "GetInt('AMT_FOOD_STAMP_ASSISTANCE') + GetInt('AMT_SUB_CC') + GetInt('CASH_AMOUNT') + GetInt('CC_AMOUNT') + GetInt('TRANSP_AMOUNT') > 0"
    message: "Sum of AMT_FOOD_STAMP_ASSISTANCE, AMT_SUB_CC, CASH_AMOUNT, CC_AMOUNT, TRANSP_AMOUNT must be greater than 0"
    fields: [AMT_FOOD_STAMP_ASSISTANCE, AMT_SUB_CC, CASH_AMOUNT, CC_AMOUNT, TRANSP_AMOUNT]

  # =============================================================================
  # T2 ifThenAlso validators (postparsing)
  # =============================================================================

  # When FAMILY_AFFILIATION is 1-3, race fields must be 1-2
  - id: t2_family_affil_1_3_race_hispanic
    expr: "not (GetInt('FAMILY_AFFILIATION') >= 1 and GetInt('FAMILY_AFFILIATION') <= 3) or (GetInt('RACE_HISPANIC') >= 1 and GetInt('RACE_HISPANIC') <= 2)"
    message: "If FAMILY_AFFILIATION is 1-3, RACE_HISPANIC must be 1-2"
    fields: [FAMILY_AFFILIATION, RACE_HISPANIC]

  - id: t2_family_affil_1_3_race_amer_indian
    expr: "not (GetInt('FAMILY_AFFILIATION') >= 1 and GetInt('FAMILY_AFFILIATION') <= 3) or (GetInt('RACE_AMER_INDIAN') >= 1 and GetInt('RACE_AMER_INDIAN') <= 2)"
    message: "If FAMILY_AFFILIATION is 1-3, RACE_AMER_INDIAN must be 1-2"
    fields: [FAMILY_AFFILIATION, RACE_AMER_INDIAN]

  - id: t2_family_affil_1_3_race_asian
    expr: "not (GetInt('FAMILY_AFFILIATION') >= 1 and GetInt('FAMILY_AFFILIATION') <= 3) or (GetInt('RACE_ASIAN') >= 1 and GetInt('RACE_ASIAN') <= 2)"
    message: "If FAMILY_AFFILIATION is 1-3, RACE_ASIAN must be 1-2"
    fields: [FAMILY_AFFILIATION, RACE_ASIAN]

  - id: t2_family_affil_1_3_race_black
    expr: "not (GetInt('FAMILY_AFFILIATION') >= 1 and GetInt('FAMILY_AFFILIATION') <= 3) or (GetInt('RACE_BLACK') >= 1 and GetInt('RACE_BLACK') <= 2)"
    message: "If FAMILY_AFFILIATION is 1-3, RACE_BLACK must be 1-2"
    fields: [FAMILY_AFFILIATION, RACE_BLACK]

  - id: t2_family_affil_1_3_race_hawaiian
    expr: "not (GetInt('FAMILY_AFFILIATION') >= 1 and GetInt('FAMILY_AFFILIATION') <= 3) or (GetInt('RACE_HAWAIIAN') >= 1 and GetInt('RACE_HAWAIIAN') <= 2)"
    message: "If FAMILY_AFFILIATION is 1-3, RACE_HAWAIIAN must be 1-2"
    fields: [FAMILY_AFFILIATION, RACE_HAWAIIAN]

  - id: t2_family_affil_1_3_race_white
    expr: "not (GetInt('FAMILY_AFFILIATION') >= 1 and GetInt('FAMILY_AFFILIATION') <= 3) or (GetInt('RACE_WHITE') >= 1 and GetInt('RACE_WHITE') <= 2)"
    message: "If FAMILY_AFFILIATION is 1-3, RACE_WHITE must be 1-2"
    fields: [FAMILY_AFFILIATION, RACE_WHITE]

  # When FAMILY_AFFILIATION is 1-3, MARITAL_STATUS must be 1-5
  - id: t2_family_affil_1_3_marital_status
    expr: "not (GetInt('FAMILY_AFFILIATION') >= 1 and GetInt('FAMILY_AFFILIATION') <= 3) or (GetInt('MARITAL_STATUS') >= 1 and GetInt('MARITAL_STATUS') <= 5)"
    message: "If FAMILY_AFFILIATION is 1-3, MARITAL_STATUS must be 1-5"
    fields: [FAMILY_AFFILIATION, MARITAL_STATUS]

  # When FAMILY_AFFILIATION is 1-2, PARENT_MINOR_CHILD must be 1-3
  - id: t2_family_affil_1_2_parent_minor_child
    expr: "not (GetInt('FAMILY_AFFILIATION') == 1 or GetInt('FAMILY_AFFILIATION') == 2) or (GetInt('PARENT_MINOR_CHILD') >= 1 and GetInt('PARENT_MINOR_CHILD') <= 3)"
    message: "If FAMILY_AFFILIATION is 1-2, PARENT_MINOR_CHILD must be 1-3"
    fields: [FAMILY_AFFILIATION, PARENT_MINOR_CHILD]

  # When FAMILY_AFFILIATION is 2-3, EDUCATION_LEVEL must be 0-16 or 98-99
  # Note: EDUCATION_LEVEL is string type in schema, so use int(GetString(...))
  - id: t2_family_affil_2_3_education_level
    expr: "not (GetInt('FAMILY_AFFILIATION') == 2 or GetInt('FAMILY_AFFILIATION') == 3) or ((int(GetString('EDUCATION_LEVEL')) >= 0 and int(GetString('EDUCATION_LEVEL')) <= 16) or (int(GetString('EDUCATION_LEVEL')) >= 98 and int(GetString('EDUCATION_LEVEL')) <= 99))"
    message: "If FAMILY_AFFILIATION is 2-3, EDUCATION_LEVEL must be 0-16 or 98-99"
    fields: [FAMILY_AFFILIATION, EDUCATION_LEVEL]

  # When FAMILY_AFFILIATION is 1, EDUCATION_LEVEL must not be 0 or 99
  # Note: EDUCATION_LEVEL is string type in schema, so use int(GetString(...))
  - id: t2_family_affil_1_education_level_not_0_99
    expr: "GetInt('FAMILY_AFFILIATION') != 1 or (int(GetString('EDUCATION_LEVEL')) != 0 and int(GetString('EDUCATION_LEVEL')) != 99)"
    message: "If FAMILY_AFFILIATION is 1, EDUCATION_LEVEL must not be 0 or 99"
    fields: [FAMILY_AFFILIATION, EDUCATION_LEVEL]

  # When FAMILY_AFFILIATION is 1, CITIZENSHIP_STATUS must be 1, 2, or 3
  - id: t2_family_affil_1_citizenship_status
    expr: "GetInt('FAMILY_AFFILIATION') != 1 or GetInt('CITIZENSHIP_STATUS') in [1, 2, 3]"
    message: "If FAMILY_AFFILIATION is 1, CITIZENSHIP_STATUS must be 1, 2, or 3"
    fields: [FAMILY_AFFILIATION, CITIZENSHIP_STATUS]

  # When FAMILY_AFFILIATION is 1-3, COOPERATION_CHILD_SUPPORT must be 1, 2, or 9
  - id: t2_family_affil_1_3_coop_child_support
    expr: "not (GetInt('FAMILY_AFFILIATION') >= 1 and GetInt('FAMILY_AFFILIATION') <= 3) or GetInt('COOPERATION_CHILD_SUPPORT') in [1, 2, 9]"
    message: "If FAMILY_AFFILIATION is 1-3, COOPERATION_CHILD_SUPPORT must be 1, 2, or 9"
    fields: [FAMILY_AFFILIATION, COOPERATION_CHILD_SUPPORT]

  # When FAMILY_AFFILIATION is 1-3, EMPLOYMENT_STATUS must be 1-3
  - id: t2_family_affil_1_3_employment_status
    expr: "not (GetInt('FAMILY_AFFILIATION') >= 1 and GetInt('FAMILY_AFFILIATION') <= 3) or (GetInt('EMPLOYMENT_STATUS') >= 1 and GetInt('EMPLOYMENT_STATUS') <= 3)"
    message: "If FAMILY_AFFILIATION is 1-3, EMPLOYMENT_STATUS must be 1-3"
    fields: [FAMILY_AFFILIATION, EMPLOYMENT_STATUS]

  # When FAMILY_AFFILIATION is 1-2, WORK_ELIGIBLE_INDICATOR must be 1-9 or 11, 12
  # Note: WORK_ELIGIBLE_INDICATOR is string type in schema, so use int(GetString(...)) for numeric comparisons
  - id: t2_family_affil_1_2_work_eligible
    expr: "not (GetInt('FAMILY_AFFILIATION') == 1 or GetInt('FAMILY_AFFILIATION') == 2) or ((int(GetString('WORK_ELIGIBLE_INDICATOR')) >= 1 and int(GetString('WORK_ELIGIBLE_INDICATOR')) <= 9) or GetString('WORK_ELIGIBLE_INDICATOR') == '11' or GetString('WORK_ELIGIBLE_INDICATOR') == '12')"
    message: "If FAMILY_AFFILIATION is 1-2, WORK_ELIGIBLE_INDICATOR must be 1-9, 11, or 12"
    fields: [FAMILY_AFFILIATION, WORK_ELIGIBLE_INDICATOR]

  # When FAMILY_AFFILIATION is 1-2, WORK_PART_STATUS must be in valid set
  - id: t2_family_affil_1_2_work_part_status
    expr: "not (GetInt('FAMILY_AFFILIATION') == 1 or GetInt('FAMILY_AFFILIATION') == 2) or GetString('WORK_PART_STATUS') in ['01', '02', '05', '07', '09', '15', '17', '18', '19', '99']"
    message: "If FAMILY_AFFILIATION is 1-2, WORK_PART_STATUS must be 01, 02, 05, 07, 09, 15, 17, 18, 19, or 99"
    fields: [FAMILY_AFFILIATION, WORK_PART_STATUS]

  # When WORK_ELIGIBLE_INDICATOR is 1-5, WORK_PART_STATUS must not be 99
  # Note: WORK_ELIGIBLE_INDICATOR is string type in schema
  - id: t2_work_eligible_1_5_work_part_not_99
    expr: "not (int(GetString('WORK_ELIGIBLE_INDICATOR')) >= 1 and int(GetString('WORK_ELIGIBLE_INDICATOR')) <= 5) or GetString('WORK_PART_STATUS') != '99'"
    message: "If WORK_ELIGIBLE_INDICATOR is 1-5, WORK_PART_STATUS must not be 99"
    fields: [WORK_ELIGIBLE_INDICATOR, WORK_PART_STATUS]

  # When WORK_ELIGIBLE_INDICATOR is 1-5, SSN must not be a repeating digit pattern
  # Note: WORK_ELIGIBLE_INDICATOR is string type in schema
  # SSN validation: must not be all same digit (000000000, 111111111, etc.)
  - id: t2_work_eligible_1_5_ssn_valid
    expr: "not (int(GetString('WORK_ELIGIBLE_INDICATOR')) >= 1 and int(GetString('WORK_ELIGIBLE_INDICATOR')) <= 5) or (GetString('SSN') != '000000000' and GetString('SSN') != '111111111' and GetString('SSN') != '222222222' and GetString('SSN') != '333333333' and GetString('SSN') != '444444444' and GetString('SSN') != '555555555' and GetString('SSN') != '666666666' and GetString('SSN') != '777777777' and GetString('SSN') != '888888888' and GetString('SSN') != '999999999')"
    message: "If WORK_ELIGIBLE_INDICATOR is 1-5, SSN must not be a repeating digit"
    fields: [WORK_ELIGIBLE_INDICATOR, SSN]

  # =============================================================================
  # T3 ifThenAlso validators (postparsing)
  # =============================================================================

  # When FAMILY_AFFILIATION is 1-2, race fields must be 1-2
  - id: t3_family_affil_1_2_race_hispanic
    expr: "not (GetInt('FAMILY_AFFILIATION') == 1 or GetInt('FAMILY_AFFILIATION') == 2) or (GetInt('RACE_HISPANIC') >= 1 and GetInt('RACE_HISPANIC') <= 2)"
    message: "If FAMILY_AFFILIATION is 1 or 2, RACE_HISPANIC must be 1-2"
    fields: [FAMILY_AFFILIATION, RACE_HISPANIC]

  - id: t3_family_affil_1_2_race_amer_indian
    expr: "not (GetInt('FAMILY_AFFILIATION') == 1 or GetInt('FAMILY_AFFILIATION') == 2) or (GetInt('RACE_AMER_INDIAN') >= 1 and GetInt('RACE_AMER_INDIAN') <= 2)"
    message: "If FAMILY_AFFILIATION is 1 or 2, RACE_AMER_INDIAN must be 1-2"
    fields: [FAMILY_AFFILIATION, RACE_AMER_INDIAN]

  - id: t3_family_affil_1_2_race_asian
    expr: "not (GetInt('FAMILY_AFFILIATION') == 1 or GetInt('FAMILY_AFFILIATION') == 2) or (GetInt('RACE_ASIAN') >= 1 and GetInt('RACE_ASIAN') <= 2)"
    message: "If FAMILY_AFFILIATION is 1 or 2, RACE_ASIAN must be 1-2"
    fields: [FAMILY_AFFILIATION, RACE_ASIAN]

  - id: t3_family_affil_1_2_race_black
    expr: "not (GetInt('FAMILY_AFFILIATION') == 1 or GetInt('FAMILY_AFFILIATION') == 2) or (GetInt('RACE_BLACK') >= 1 and GetInt('RACE_BLACK') <= 2)"
    message: "If FAMILY_AFFILIATION is 1 or 2, RACE_BLACK must be 1-2"
    fields: [FAMILY_AFFILIATION, RACE_BLACK]

  - id: t3_family_affil_1_2_race_hawaiian
    expr: "not (GetInt('FAMILY_AFFILIATION') == 1 or GetInt('FAMILY_AFFILIATION') == 2) or (GetInt('RACE_HAWAIIAN') >= 1 and GetInt('RACE_HAWAIIAN') <= 2)"
    message: "If FAMILY_AFFILIATION is 1 or 2, RACE_HAWAIIAN must be 1-2"
    fields: [FAMILY_AFFILIATION, RACE_HAWAIIAN]

  - id: t3_family_affil_1_2_race_white
    expr: "not (GetInt('FAMILY_AFFILIATION') == 1 or GetInt('FAMILY_AFFILIATION') == 2) or (GetInt('RACE_WHITE') >= 1 and GetInt('RACE_WHITE') <= 2)"
    message: "If FAMILY_AFFILIATION is 1 or 2, RACE_WHITE must be 1-2"
    fields: [FAMILY_AFFILIATION, RACE_WHITE]

  # When FAMILY_AFFILIATION is 1-2, RELATIONSHIP_HOH must be 4-9
  # Note: RELATIONSHIP_HOH is string type in schema
  - id: t3_family_affil_1_2_relationship_hoh
    expr: "not (GetInt('FAMILY_AFFILIATION') == 1 or GetInt('FAMILY_AFFILIATION') == 2) or (int(GetString('RELATIONSHIP_HOH')) >= 4 and int(GetString('RELATIONSHIP_HOH')) <= 9)"
    message: "If FAMILY_AFFILIATION is 1 or 2, RELATIONSHIP_HOH must be 4-9"
    fields: [FAMILY_AFFILIATION, RELATIONSHIP_HOH]

  # When FAMILY_AFFILIATION is 1-2, PARENT_MINOR_CHILD must be 2 or 3
  - id: t3_family_affil_1_2_parent_minor_child
    expr: "not (GetInt('FAMILY_AFFILIATION') == 1 or GetInt('FAMILY_AFFILIATION') == 2) or (GetInt('PARENT_MINOR_CHILD') == 2 or GetInt('PARENT_MINOR_CHILD') == 3)"
    message: "If FAMILY_AFFILIATION is 1 or 2, PARENT_MINOR_CHILD must be 2 or 3"
    fields: [FAMILY_AFFILIATION, PARENT_MINOR_CHILD]

  # When FAMILY_AFFILIATION is 1, EDUCATION_LEVEL must not be 99
  # Note: EDUCATION_LEVEL is string type in schema
  - id: t3_family_affil_1_education_level_not_99
    expr: "GetInt('FAMILY_AFFILIATION') != 1 or int(GetString('EDUCATION_LEVEL')) != 99"
    message: "If FAMILY_AFFILIATION is 1, EDUCATION_LEVEL must not be 99"
    fields: [FAMILY_AFFILIATION, EDUCATION_LEVEL]

  # When FAMILY_AFFILIATION is 1, CITIZENSHIP_STATUS must be 1, 2, or 3
  - id: t3_family_affil_1_citizenship_status
    expr: "GetInt('FAMILY_AFFILIATION') != 1 or (GetInt('CITIZENSHIP_STATUS') == 1 or GetInt('CITIZENSHIP_STATUS') == 2 or GetInt('CITIZENSHIP_STATUS') == 3)"
    message: "If FAMILY_AFFILIATION is 1, CITIZENSHIP_STATUS must be 1, 2, or 3"
    fields: [FAMILY_AFFILIATION, CITIZENSHIP_STATUS]

  # When FAMILY_AFFILIATION is 2, CITIZENSHIP_STATUS must be 1, 2, 3, or 9
  - id: t3_family_affil_2_citizenship_status
    expr: "GetInt('FAMILY_AFFILIATION') != 2 or (GetInt('CITIZENSHIP_STATUS') == 1 or GetInt('CITIZENSHIP_STATUS') == 2 or GetInt('CITIZENSHIP_STATUS') == 3 or GetInt('CITIZENSHIP_STATUS') == 9)"
    message: "If FAMILY_AFFILIATION is 2, CITIZENSHIP_STATUS must be 1, 2, 3, or 9"
    fields: [FAMILY_AFFILIATION, CITIZENSHIP_STATUS]

category4:
  # Group/case level validators
  - id: t1_required
    expr: "RecordCounts['T1'] >= 1"
    message: "Each case must have at least one T1 record"

  - id: t1_has_children
    expr: "validateT1HasChildren(Group)"
    message: "T1 record must have at least one T2 or T3 child"

  - id: no_duplicate_case_number
    expr: "not hasDuplicateField(Group, 'T1', 'CASE_NUMBER')"
    message: "Duplicate case numbers found in T1 records"

  - id: t4_required
    expr: "RecordCounts['T4'] >= 1"
    message: "Each case must have at least one T4 record"

  - id: t5_required
    expr: "RecordCounts['T5'] >= 1"
    message: "Each case must have at least one T5 record"

  - id: max_3_t3_per_group
    expr: "RecordCounts['T3'] <= 3"
    message: "Maximum 3 T3 records allowed per case"
