# Master pipeline configuration
# All values shown are production defaults.

# Pipeline worker configuration
pipeline:
  num_workers: 32          # Parser worker goroutines
  work_buffer_size: 256    # Channel buffer for parser input
  pool_prewarm_size: 10000 # Object pool pre-allocation per schema

# Writer configuration
writer:
  flush_threshold: 10000        # Records per table before auto-flush
  error_flush_threshold: 10000 # Error records before auto-flush

# Database connection pool
database:
  max_conns: 10
  min_conns: 4
  max_conn_lifetime: 30m
  max_conn_idle_time: 5m
  health_check_period: 30s
