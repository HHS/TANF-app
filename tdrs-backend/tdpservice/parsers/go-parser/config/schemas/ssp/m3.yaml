# SSP M3 Record Schema
# Child-level data for active SSP-MOE cases
#
# This record contains demographic and income data for children.
# M3 records contain data for TWO children per line.
# The parser produces 1 or 2 rows depending on whether Child 2 data is present.

record_type: M3
program: SSP
section: 1
document: "SSP Active Case Data"
format: positional

# Fields shared across all segments (included in every output row)
shared:
  - name: RecordType
    friendly_name: Record Type
    item: "0"
    start: 0
    end: 2
    type: string
    required: true

  - name: RPT_MONTH_YEAR
    friendly_name: Reporting Month/Year
    item: "3"
    start: 2
    end: 8
    type: integer
    required: true

  - name: CASE_NUMBER
    friendly_name: Case Number
    item: "5"
    start: 8
    end: 19
    type: string
    required: true

  - name: FIPS_CODE
    friendly_name: State FIPS Code
    item: "1"
    start: 19
    end: 21
    type: string
    required: true

# Each segment produces one output row (combined with shared fields)
# M3 has 2 segments: Child 1 and Child 2
segments:
  # Child 1 (always present)
  - fields:
      - name: FAMILY_AFFILIATION
        friendly_name: Family Affiliation
        item: "60"
        start: 19
        end: 20
        type: integer
        required: true

      - name: DATE_OF_BIRTH
        friendly_name: Date of Birth
        item: "61"
        start: 20
        end: 28
        type: string
        required: true

      - name: SSN
        friendly_name: Social Security Number
        item: "62"
        start: 28
        end: 37
        type: string
        required: true

      - name: RACE_HISPANIC
        friendly_name: Hispanic or Latino
        item: "63A"
        start: 37
        end: 38
        type: integer
        required: false

      - name: RACE_AMER_INDIAN
        friendly_name: American Indian or Alaska Native
        item: "63B"
        start: 38
        end: 39
        type: integer
        required: false

      - name: RACE_ASIAN
        friendly_name: Asian
        item: "63C"
        start: 39
        end: 40
        type: integer
        required: false

      - name: RACE_BLACK
        friendly_name: Black or African American
        item: "63D"
        start: 40
        end: 41
        type: integer
        required: false

      - name: RACE_HAWAIIAN
        friendly_name: Native Hawaiian or Pacific Islander
        item: "63E"
        start: 41
        end: 42
        type: integer
        required: false

      - name: RACE_WHITE
        friendly_name: White
        item: "63F"
        start: 42
        end: 43
        type: integer
        required: false

      - name: SEX
        friendly_name: Sex
        item: "64"
        start: 43
        end: 44
        type: integer
        required: true

      - name: RECEIVE_NONSSI_BENEFITS
        friendly_name: Receives Federal Disability Benefits
        item: "65A"
        start: 44
        end: 45
        type: integer
        required: true

      - name: RECEIVE_SSI
        friendly_name: Receives SSI or AABD
        item: "65B"
        start: 45
        end: 46
        type: integer
        required: true

      - name: RELATIONSHIP_HOH
        friendly_name: Relationship to Head-of-Household
        item: "66"
        start: 46
        end: 48
        type: integer
        required: false

      - name: PARENT_MINOR_CHILD
        friendly_name: Parental Status of Minor
        item: "67"
        start: 48
        end: 49
        type: integer
        required: false

      - name: EDUCATION_LEVEL
        friendly_name: Educational Level
        item: "68"
        start: 49
