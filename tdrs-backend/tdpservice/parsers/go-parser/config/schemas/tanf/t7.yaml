# TANF T7 Record Schema
# Stratum data for TANF (Section 4)
#
# This record contains family counts by stratum for a calendar quarter.
# Each T7 record has data for 10 strata, with each stratum having 3 months (A, B, C).
# The parser should produce 30 output rows from each T7 record line (10 strata × 3 months).
#
# Each stratum block is 24 bytes:
#   - TDRS_SECTION_IND: 1 byte
#   - STRATUM: 2 bytes
#   - FAMILIES_MONTH_A: 7 bytes
#   - FAMILIES_MONTH_B: 7 bytes
#   - FAMILIES_MONTH_C: 7 bytes

record_type: T7
program: TANF
section: 4
document: "TANF Stratum Data"

format: positional

fields:
  # Record identification (shared)
  - name: RecordType
    friendly_name: Record Type
    item: "0"
    start: 0
    end: 2
    type: string
    required: true

  - name: CALENDAR_QUARTER
    friendly_name: Calendar Quarter
    item: "3"
    start: 2
    end: 7
    type: integer
    required: true

  # ============================================================================
  # STRATUM 1 (positions 7-31)
  # ============================================================================

  - name: TDRS_SECTION_IND
    friendly_name: TDR Section Indicator (Stratum 1)
    item: "4"
    start: 7
    end: 8
    type: string
    required: true

  - name: STRATUM
    friendly_name: Stratum (Stratum 1)
    item: "5"
    start: 8
    end: 10
    type: string
    required: true

  - name: FAMILIES_MONTH
    friendly_name: Number of Families Month A (Stratum 1)
    item: "6A"
