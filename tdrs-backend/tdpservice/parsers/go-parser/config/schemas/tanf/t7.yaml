# TANF T7 Record Schema
# Stratum data for TANF (Section 4)
#
# This record contains family counts by stratum for a calendar quarter.
# Each T7 record has data for 10 strata, with each stratum having 3 months (A, B, C).
# Each stratum block is 24 bytes:
#   - TDRS_SECTION_IND: 1 byte
#   - STRATUM: 2 bytes
#   - FAMILIES_MONTH_A: 7 bytes
#   - FAMILIES_MONTH_B: 7 bytes
#   - FAMILIES_MONTH_C: 7 bytes

record_type: T7
program: TANF
section: 4
document: "TANF Stratum Data"
format: positional

# Fields shared across all segments (included in every output row)
shared:
  - name: RecordType
    friendly_name: Record Type
    item: "0"
    start: 0
    end: 2
    type: string
    required: true

  - name: CALENDAR_QUARTER
    friendly_name: Calendar Quarter
    item: "3"
    start: 2
    end: 7
    type: integer
    required: true

# Each segment produces one output row (combined with shared fields)
# T7 has 10 segments: one per stratum
segments:
  # Stratum 1 (positions 7-31)
  - fields:
      - name: TDRS_SECTION_IND
        friendly_name: TDR Section Indicator
        item: "4"
        start: 7
        end: 8
        type: string
        required: true

      - name: STRATUM
        friendly_name: Stratum
        item: "5"
        start: 8
        end: 10
        type: string
        required: true

      - name: FAMILIES_MONTH_A
        friendly_name: Number of Families Month A
        item: "6A"
        start: 10
        end: 17
        type: integer
        required: true

      - name: FAMILIES_MONTH_B
        friendly_name: Number of Families Month B
        item: "6B"
        start: 17
        end: 24
        type: integer
        required: true

      - name: FAMILIES_MONTH_C
        friendly_name: Number of Families Month C
        item: "6C"
        start: 24
        end: 31
        type: integer
        required: true

