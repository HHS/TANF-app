# TANF T3 Record Schema
# Child-level data for active TANF cases
#
# This record contains individual child information including demographics
# and income. Each T3 record can contain data for up to TWO children.
# Child 1 occupies positions 19-60, Child 2 occupies positions 60-101.

record_type: T3
program: TANF
section: 1
document: "TANF Active Case Data"

format: positional

# T3 records contain two child segments in one line.
# This schema defines both segments with a suffix to distinguish them.
# The parser should handle this by creating two parsed records from one line,
# or by treating them as a single record with CHILD1_* and CHILD2_* prefixes.

fields:
  # Record identification (shared)
  - name: RecordType
    friendly_name: Record Type
    start: 0
    end: 2
    type: string
    required: true

  - name: RPT_MONTH_YEAR
    friendly_name: Reporting Month/Year
    start: 2
    end: 8
    type: string
    required: true

  - name: CASE_NUMBER
    friendly_name: Case Number
    start: 8
    end: 19
    type: string
    required: true

  # ============================================================================
  # CHILD 1 (positions 19-60)
  # ============================================================================

  - name: FAMILY_AFFILIATION
    friendly_name: Family Affiliation (Child 1)
    start: 19
    end: 20
    type: integer
    required: true

  - name: DATE_OF_BIRTH
    friendly_name: Date of Birth (Child 1)
    start: 20
    end: 28
    type: string
    required: true

  - name: SSN
    friendly_name: Social Security Number (Child 1)
    start: 28
    end: 37
    type: string
    required: true

  - name: RACE_HISPANIC
    friendly_name: Race Hispanic (Child 1)
    start: 37
    end: 38
    type: integer
    required: false

  - name: RACE_AMER_INDIAN
    friendly_name: Race American Indian (Child 1)
    start: 38
    end: 39
    type: integer
    required: false

  - name: RACE_ASIAN
