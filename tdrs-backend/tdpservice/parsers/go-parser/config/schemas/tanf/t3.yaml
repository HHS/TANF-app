    required: true

  - name: RECEIVE_SSI
    friendly_name: Receive SSI (Child 1)
    start: 45
    end: 46
    type: integer
    required: true

  - name: RELATIONSHIP_HOH
    friendly_name: Relationship to Head of Household (Child 1)
    start: 46
    end: 48
    type: string
    required: false

  - name: PARENT_MINOR_CHILD
    friendly_name: Parent with Minor Child (Child 1)
    start: 48
    end: 49
    type: integer
    required: false

  - name: EDUCATION_LEVEL
    friendly_name: Education Level (Child 1)
    start: 49
    end: 51
    type: string
    required: true

  - name: CITIZENSHIP_STATUS
    friendly_name: Citizenship Status (Child 1)
    start: 51
