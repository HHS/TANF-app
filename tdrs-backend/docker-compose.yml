# Base Docker compose for all environments
services:
  zaproxy:
    platform: linux/amd64
    image: ghcr.io/${REGISTRY_OWNER:-hhs}/zap-stable:2.14.0
    command: sleep 3600
    depends_on:
      - web
    volumes:
      - ./reports:/zap/wrk/:rw
      - ../scripts/zap-hook.py:/zap/scripts/zap-hook.py:ro

  postgres:
    image: postgres:15.7
    environment:
      - PGDATA=/var/lib/postgresql/data/
      - POSTGRES_DB=tdrs_test
      - POSTGRES_PASSWORD=something_secure
      - POSTGRES_PORT=5432
      - POSTGRES_USER=tdpuser
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/:rw

  grafana-pg:
    image: postgres:15.7
    environment:
      - PGDATA=/var/lib/postgresql/data/
      - POSTGRES_DB=grafana
      - POSTGRES_PASSWORD=something_secure
      - POSTGRES_PORT=5432
      - POSTGRES_USER=grafana
    ports:
      - "5433:5432"
    volumes:
      - grafana_pg_data:/var/lib/postgresql/data/:rw

  keycloak-pg:
    image: postgres:15.7
    environment:
      - PGDATA=/var/lib/postgresql/data/
      - POSTGRES_DB=keycloak
      - POSTGRES_PASSWORD=something_secure
      - POSTGRES_PORT=5432
      - POSTGRES_USER=keycloak
    ports:
      - "5434:5432"
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data/:rw

  keycloak:
    build:
      context: ./keycloak
    environment:
      - DEPLOY_ENV=local
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-pg:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=something_secure
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_PROXY_HEADERS=xforwarded
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - KC_HTTP_METRICS_HISTOGRAMS_ENABLED=true
      - KC_EVENT_METRICS_USER_ENABLED=true
      - KC_EVENT_METRICS_USER_EVENTS=client_login,code_to_token,login,logout,refresh_token,token_exchange
      - KC_EVENT_METRICS_USER_TAGS=realm,idp,clientId
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_TDP_DJANGO_CLIENT_SECRET=tdp-django-local-secret
      - KC_TDP_GRAFANA_CLIENT_SECRET=tdp-grafana-local-secret
      # Login.gov IdP (sandbox defaults)
      - LOGIN_GOV_CLIENT_ID=urn:gov:gsa:openidconnect.profiles:sp:sso:hhs:tanf-proto-dev
      - LOGIN_GOV_AUTH_URL=https://idp.int.identitysandbox.gov/openid_connect/authorize
      - LOGIN_GOV_TOKEN_URL=https://idp.int.identitysandbox.gov/api/openid_connect/token
      - LOGIN_GOV_JWKS_URL=https://idp.int.identitysandbox.gov/api/openid_connect/certs
      - LOGIN_GOV_LOGOUT_URL=https://idp.int.identitysandbox.gov/openid_connect/logout
      - LOGIN_GOV_ISSUER=https://idp.int.identitysandbox.gov/
      # AMS IdP (stage defaults)
      - AMS_CLIENT_ID=${AMS_CLIENT_ID}
      - AMS_CLIENT_SECRET=${AMS_CLIENT_SECRET}
      - AMS_AUTH_URL=https://sso-stage.acf.hhs.gov/auth/realms/ACF-SSO/protocol/openid-connect/auth
      - AMS_TOKEN_URL=https://sso-stage.acf.hhs.gov/auth/realms/ACF-SSO/protocol/openid-connect/token
      - AMS_JWKS_URL=https://sso-stage.acf.hhs.gov/auth/realms/ACF-SSO/protocol/openid-connect/certs
      - AMS_LOGOUT_URL=https://sso-stage.acf.hhs.gov/auth/realms/ACF-SSO/protocol/openid-connect/logout
      - AMS_USERINFO_URL=https://sso-stage.acf.hhs.gov/auth/realms/ACF-SSO/protocol/openid-connect/userinfo
      - AMS_ISSUER=https://sso-stage.acf.hhs.gov/auth/realms/ACF-SSO
    ports:
      - "8443:8080"
      - "9001:9000"
    command: start-dev --import-realm
    depends_on:
      - keycloak-pg

  keycloak-configure:
    build:
      context: ./keycloak
    environment:
      - DEPLOY_ENV=local
      - KEYCLOAK_MANAGEMENT_URL=http://keycloak:9000
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - LOGIN_GOV_JWT_KEY=${JWT_KEY}
    entrypoint: ["/bin/bash", "/opt/keycloak/configure-idps.sh"]
    depends_on:
      - keycloak

  clamav-rest:
    image: rafttech/clamav-rest:0.103.2
    environment:
      - MAX_FILE_SIZE=200M
    ports:
      - "9000:9000"

  localstack:
    image: localstack/localstack:0.13.3
    environment:
      - SERVICES=s3
      - DATA_DIR=/tmp/localstack/data
      - AWS_BUCKET=tdp-datafiles-localstack
      - AWS_REGION_NAME=us-gov-west-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/tmp/localstack
      # Copy in the Localstack setup script to configure any buckets needed
      - ../scripts/localstack-setup.sh:/docker-entrypoint-initaws.d/localstack-setup.sh

  grafana:
    restart: always
    image: grafana/grafana:12.0.2
    ports:
      - 9400:9400
    environment:
      - GF_PATHS_PROVISIONING=/usr/share/grafana/conf/provisioning
      - GF_SERVER_HTTP_PORT=9400
    volumes:
      - ./plg/grafana/datasources.local.yml:/usr/share/grafana/conf/provisioning/datasources/datasources.yml
      - ./plg/grafana/providers.local.yml:/usr/share/grafana/conf/provisioning/dashboards/providers.yml
      - ./plg/grafana/dashboards:/var/lib/grafana/dashboards
      - ./plg/grafana/custom.local.ini:/usr/share/grafana/conf/custom.ini
      - grafana_data:/var/lib/grafana
    command: --config /usr/share/grafana/conf/custom.ini
    depends_on:
      - grafana-pg
      - keycloak

  grafana-init:
    image: curlimages/curl:8.5.0
    volumes:
      - ./plg/grafana/init-grafana-orgs.sh:/init-grafana-orgs.sh:ro
    entrypoint: ["/bin/sh", "/init-grafana-orgs.sh"]
    depends_on:
      - grafana

  alertmanager:
    restart: always
    image: prom/alertmanager:v0.27.0
    ports:
      - 9093:9093
    volumes:
      - ./plg/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command: --config.file=/etc/alertmanager/alertmanager.yml
      --storage.path=/alertmanager --log.level=debug
      --web.external-url=http://localhost:3000/alerts --web.route-prefix=/alerts
      --cluster.listen-address=""

  mimir:
    image: grafana/mimir:2.15.1
    ports:
      - 9009:9009
    volumes:
      - ./plg/mimir/mimir.local.yml:/etc/mimir/mimir.yml
    command: --config.file=/etc/mimir/mimir.yml
    depends_on:
      - localstack

  prometheus:
    restart: always
    image: prom/prometheus:v2.54.1
    ports:
      - 9090:9090
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms
    volumes:
      - ./plg/prometheus/prometheus.local.yml:/etc/prometheus/prometheus.yml
      - ./plg/prometheus/django-rules.yml:/etc/prometheus/django-rules.yml
      - ./plg/prometheus/alerts.local.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    depends_on:
      - web
      - celery-exporter
      - postgres-exporter
      - alertmanager
      - mimir

  alloy:
    restart: always
    image: grafana/alloy:v1.8.0
    ports:
      - 12345:12345
      - 12346:12346
    volumes:
      - ./plg/alloy:/etc/alloy
      - ~/tdp-logs/nginx:/var/log/nginx
      - logs:/logs
    command: run --server.http.listen-addr=0.0.0.0:12345
      --storage.path=/var/lib/alloy/data /etc/alloy/alloy.local.config

  tempo:
    restart: always
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./plg/tempo/tempo.local.yml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200" # tempo
      - "9095:9095" # tempo grpc
      - "4317:4317" # otlp grpc
      - "4318:4318" # otlp http
    depends_on:
      - prometheus
      - localstack
      - alloy

  loki:
    restart: always
    image: grafana/loki:3.1.1
    ports:
      - 3100:3100
    volumes:
      - loki_data:/loki
      - ./plg/loki/loki.local.yml:/loki/loki.yml
    command: -config.file=/loki/loki.yml

  celery-exporter:
    restart: always
    image: danihodovic/celery-exporter:0.11.1
    ports:
      - 9808:9808
    environment:
      - CE_BROKER_URL=redis://redis-server:6379/0
    depends_on:
      - web

  postgres-exporter:
    restart: always
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - 9187:9187
    environment:
      - DATA_SOURCE_NAME=postgres://tdpuser:something_secure@postgres:5432/tdrs_test?sslmode=disable
    depends_on:
      - web

  web:
    restart: always
    environment:
      - CLAMAV_NEEDED
      - AV_SCAN_URL=http://clamav-rest:9000/scan
      - DB_HOST=postgres
      - DB_NAME=tdrs_test
      - DB_PASSWORD=something_secure
      - DB_PORT=5432
      - DB_USER=tdpuser
      - DJANGO_CONFIGURATION=${DJANGO_CONFIGURATION:-Local}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-tdp-dev-insecure}
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-tdpservice.settings.local}
      - LOCALSTACK_HOST=localstack
      - DJANGO_SU_NAME
      - JWT_CERT_TEST
      - JWT_KEY
      - USE_LOCALSTACK
      - LOGGING_LEVEL
      - AMS_CLIENT_ID
      - AMS_CLIENT_SECRET
      - AMS_CONFIGURATION_ENDPOINT
      - REDIS_URI=redis://redis-server:6379
      - REDIS_SERVER_LOCAL=TRUE
      - CYPRESS_TOKEN
      - DJANGO_DEBUG
      - SENDGRID_API_KEY
      - GENERATE_TRAILER_ERRORS=True
      - BYPASS_OFA_AUTH
      - FRA_PILOT_STATES
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_S3_BUCKET_NAME
      - AWS_S3_LOGS_PREFIX
      - GRAFANA_PASSWORD
      - GRAFANA_USER
      - OFA_DB_PASSWORD
      - OFA_DB_USER
      - OTEL_PYTHON_DJANGO_EXCLUDED_URLS
      - CGAPPNAME_BACKEND
      - SENTRY_DSN
      # Keycloak sync
      - KEYCLOAK_SYNC_ENABLED=true
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=tdp
      - KEYCLOAK_ADMIN_CLIENT_ID=tdp-django
      - KEYCLOAK_ADMIN_CLIENT_SECRET=tdp-django-local-secret
      - KEYCLOAK_DJANGO_CLIENT_ID=tdp-django
      - KEYCLOAK_DJANGO_CLIENT_SECRET=tdp-django-local-secret
      - KEYCLOAK_AUTH_PERCENTAGE
    volumes:
      - .:/tdpapp
      - logs:/tmp

    build:
      context: .
      args:
        REGISTRY_OWNER: ${REGISTRY_OWNER:-hhs}
    command: >
      bash -c "rm -f /tmp/web-ready && ./wait_for_services.sh && ./manage.py
      makemigrations && ./manage.py migrate && ./manage.py populate_stts &&
      ./manage.py populate_history --auto && python
      ./plg/grafana_views/generate_views.py --all && ./manage.py runscript
      apply_grafana_views && touch /tmp/web-ready && exec ./gunicorn_start.sh"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/web-ready"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    ports:
      - "8989:8080"
    tty: true
    depends_on:
      - clamav-rest
      - localstack
      - postgres
      - redis-server
      - celery

  redis-server:
    image: redis:alpine
    command: redis-server /tdpapp/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - .:/tdpapp

  go-parser:
    build:
      context: ../tdrs-services/parser
      dockerfile: Dockerfile
    command: ["--server.mode=celery", "--storage.source=s3"]
    environment:
      - REDIS_URL=redis://redis-server:6379/0
      - GO_PARSER_QUEUE=go-parser
      - DATABASE_URL=postgres://tdpuser:something_secure@postgres:5432/tdrs_test?sslmode=disable
      - S3_BUCKET=tdp-datafiles-localstack
      - S3_ENDPOINT=http://localstack:4566
      - S3_KEY_PREFIX=dev
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-gov-west-1
      - AWS_EC2_METADATA_DISABLED=true
    depends_on:
      redis-server:
        condition: service_started
      postgres:
        condition: service_started
      localstack:
        condition: service_started
      web:
        condition: service_healthy

  celery:
    restart: always
    environment:
      - CLAMAV_NEEDED
      - AV_SCAN_URL=http://clamav-rest:9000/scan
      - DB_HOST=postgres
      - DB_NAME=tdrs_test
      - DB_PASSWORD=something_secure
      - DB_PORT=5432
      - DB_USER=tdpuser
      - DJANGO_CONFIGURATION=${DJANGO_CONFIGURATION:-Local}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-tdp-dev-insecure}
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-tdpservice.settings.local}
      - LOCALSTACK_HOST=localstack
      - DJANGO_SU_NAME
      - JWT_CERT_TEST
      - JWT_KEY
      - USE_LOCALSTACK
      - LOGGING_LEVEL
      - AMS_CLIENT_ID
      - AMS_CLIENT_SECRET
      - AMS_CONFIGURATION_ENDPOINT
      - REDIS_URI=redis://redis-server:6379
      - CELERY_WORKER_QUEUES=celery
      - CELERY_GO_PARSER_QUEUE=go-parser
      - REDIS_SERVER_LOCAL=TRUE
      - CYPRESS_TOKEN
      - DJANGO_DEBUG
      - SENDGRID_API_KEY
      - GENERATE_TRAILER_ERRORS=True
      - BYPASS_OFA_AUTH
      - FRA_PILOT_STATES
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_S3_BUCKET_NAME
      - AWS_S3_LOGS_PREFIX
      # Keycloak sync
      - KEYCLOAK_SYNC_ENABLED=true
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=tdp
      - KEYCLOAK_ADMIN_CLIENT_ID=tdp-django
      - KEYCLOAK_ADMIN_CLIENT_SECRET=tdp-django-local-secret
      - KEYCLOAK_DJANGO_CLIENT_ID=tdp-django
      - KEYCLOAK_DJANGO_CLIENT_SECRET=tdp-django-local-secret
    volumes:
      - .:/tdpapp
      - logs:/tmp
    ports:
      - "5555:8080"
    image: tdp
    build:
      context: .
      args:
        REGISTRY_OWNER: ${REGISTRY_OWNER:-hhs}
    command: bash -c "./wait_for_services.sh && ./celery_start.sh"
    depends_on:
      - localstack
      - postgres
      - redis-server

volumes:
  localstack_data:
  postgres_data:
  grafana_pg_data:
  keycloak_pg_data:
  prometheus_data:
  grafana_data:
  loki_data:
  logs:
  tempo-data:

networks:
  default:
    name: external-net
    external: true
