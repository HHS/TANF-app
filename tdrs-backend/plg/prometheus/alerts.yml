groups:
  - name: database.alerts
    rules:
      - alert: DevDatabaseDown
        expr: last_over_time(pg_up{job="postgres-dev"}[1m]) == 0 or last_over_time(up{job="postgres-dev"}[1m]) == 0
        labels:
          severity: CRITICAL
        annotations:
          summary: "The {{ $labels.service }} service is down."
          description: "The {{ $labels.service }} service in the {{ $labels.env }} environment has been down for more than 1 minute."
      - alert: StagingDatabaseDown
        expr: last_over_time(pg_up{job="postgres-staging"}[1m]) == 0 or last_over_time(up{job="postgres-staging"}[1m]) == 0
        labels:
          severity: ERROR
        annotations:
          summary: "The {{ $labels.service }} service is down."
          description: "The {{ $labels.service }} service in the {{ $labels.env }} environment has been down for more than 1 minute."
      - alert: ProductionDatabaseDown
        expr: last_over_time(pg_up{job="postgres-production"}[1m]) == 0 or last_over_time(up{job="postgres-production"}[1m]) == 0
        labels:
          severity: CRITICAL
        annotations:
          summary: "The {{ $labels.service }} service is down."
          description: "The {{ $labels.service }} service in the {{ $labels.env }} environment has been down for more than 1 minute."
  - name: backend.alerts
    rules:
    - alert: DevEnvironmentBackendDown
      expr: last_over_time(up{job=~"tdp-backend.*", job!~".*prod", job!~".*staging"}[1m]) == 0
      for: 10m
      labels:
        severity: ERROR
      annotations:
          summary: "The {{ $labels.service }} service is down."
          description: "The {{ $labels.service }} service in the {{ $labels.env }} environment has been down for more than 10 minutes."
    - alert: StagingBackendDown
      expr: last_over_time(up{job=~"tdp-backend-staging"}[1m]) == 0
      for: 10m
      labels:
        severity: ERROR
      annotations:
          summary: "The {{ $labels.service }} service is down."
          description: "The {{ $labels.service }} service in the {{ $labels.env }} environment has been down for more than 10 minutes."
    - alert: ProductionBackendDown
      expr: last_over_time(up{job=~"tdp-backend-prod"}[1m]) == 0
      for: 10m
      labels:
        severity: CRITICAL
      annotations:
          summary: "The {{ $labels.service }} service is down."
          description: "The {{ $labels.service }} service in the {{ $labels.env }} environment has been down for more than 10 minutes."
  - name: plg.alerts
    rules:
    - alert: LokiDown
      expr: last_over_time(up{job="loki"}[1m]) == 0
      labels:
        severity: ERROR
      annotations:
          summary: "The {{ $labels.service }} service is down."
          description: "The {{ $labels.service }} service in the {{ $labels.env }} environment has been down for more than 1 minute."
    - alert: GrafanaDown
      expr: last_over_time(up{job="grafana"}[1m]) == 0
      labels:
        severity: ERROR
      annotations:
          summary: "The {{ $labels.service }} service is down."
          description: "The {{ $labels.service }} service in the {{ $labels.env }} environment has been down for more than 1 minute."
  - name: app.alerts
    rules:
    - alert: UpTime
      expr: avg_over_time(up[1d]) < 0.95
      for: 30m
      labels:
        severity: WARNING
      annotations:
          summary: "The {{ $labels.service }} service has a uptime warning."
          description: "The {{ $labels.service }} service in the {{ $labels.env }} environment is not maintaining 95% uptime."
  - name: celery.alerts
    rules:
      - alert: CeleryTaskHighFailRate
        annotations:
          description: "More than 5% tasks failed for the task {{ $labels.job }}/{{ $labels.queue_name }}/{{ $labels.name }} the past 10m."
          summary: "Celery high task fail rate."
        expr: |
          sum(
            increase(
              celery_task_failed_total{
                job=~"celery-.*|celery-exporter.*",
                queue_name!~"None",
                name!~"None"
              }[10m]
            )
          )  by (job, queue_name, name)
          /
          (
            sum(
              increase(
                celery_task_failed_total{
                  job=~"celery-.*|celery-exporter.*",
                  queue_name!~"None",
                  name!~"None"
                }[10m]
              )
            )  by (job, queue_name, name)
            +
            sum(
              increase(
                celery_task_succeeded_total{
                  job=~"celery-.*|celery-exporter.*",
                  queue_name!~"None",
                  name!~"None"
                }[10m]
              )
            )  by (job, queue_name, name)
          )
          * 100 > 5
        for: 1m
        labels:
          severity: WARNING
      - alert: CeleryHighQueueLength
        annotations:
          description: "More than 15 tasks in the queue {{ $labels.job }}/{{ $labels.queue_name }} the past 20m."
          summary: "Celery high queue length."
        expr: |
          sum(
            celery_queue_length{
              job=~"celery-.*|celery-exporter.*",
              queue_name!~"None"
            }
          )  by (job, queue_name)
          > 15
        for: 20m
        labels:
          severity: WARNING
      - alert: CeleryWorkerDown
        expr: last_over_time(up{job=~"celery-.*|celery-exporter.*"}[1m]) == 0
        for: 10m
        labels:
          severity: ERROR
        annotations:
          summary: "The {{ $labels.service }} service is down."
          description: "The {{ $labels.service }} service in the {{ $labels.env }} environment has been down for more than 10 minutes."
  - name: keycloak.alerts
    rules:
      - alert: KeycloakDown
        expr: last_over_time(up{job="keycloak"}[1m]) == 0
        labels:
          severity: CRITICAL
        annotations:
          summary: "Keycloak is down."
          description: "The Keycloak service has been unreachable for more than 1 minute. New logins will fail."
      - alert: KeycloakAuthFailureSpike
        expr: rate(keycloak_failed_login_attempts_total{job="keycloak"}[5m]) > 3 * avg_over_time(rate(keycloak_failed_login_attempts_total{job="keycloak"}[5m])[1h:5m])
        for: 5m
        labels:
          severity: WARNING
        annotations:
          summary: "Keycloak auth failure spike detected."
          description: "Failed login rate has exceeded 3x the 1-hour baseline for 5 minutes. May indicate IdP issues or brute force attempts."
      - alert: KeycloakTokenExchangeFailures
        expr: rate(keycloak_code_to_token_requests_total{error!="", job="keycloak"}[5m]) > 0
        for: 5m
        labels:
          severity: CRITICAL
        annotations:
          summary: "Keycloak token exchange failures."
          description: "Token exchange errors have been occurring for 5 minutes. Users may not be able to complete login."
      - alert: KeycloakLoginLatencyHigh
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{job="keycloak"}[10m])) > 5
        for: 10m
        labels:
          severity: WARNING
        annotations:
          summary: "Keycloak login latency is high."
          description: "Keycloak p95 request latency has exceeded 5 seconds for 10 minutes."
      - alert: KeycloakHighMemoryUsage
        expr: jvm_memory_used_bytes{job="keycloak", area="heap"} / jvm_memory_max_bytes{job="keycloak", area="heap"} > 0.85
        for: 10m
        labels:
          severity: WARNING
        annotations:
          summary: "Keycloak JVM heap usage is high."
          description: "Keycloak JVM heap usage has exceeded 85% for 10 minutes. May indicate memory pressure or a leak."
