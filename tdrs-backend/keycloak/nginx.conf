# nginx.conf -- reverse proxy in front of Keycloak
#
# This file is a template. The entrypoint.sh script replaces LISTEN_PORT
# with the actual port at container startup ($PORT on cloud.gov, 8080 locally).
#
# Why nginx? Keycloak 26 sets X-Frame-Options: DENY on non-realm pages
# (root URL, admin console paths). This can't be overridden via realm
# config or quarkus.properties. Nginx strips and replaces the header.

worker_processes 1;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    # Non-root temp directories (container runs as uid 1000)
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;

    access_log /dev/stdout;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen LISTEN_PORT default_server;

        # Proxy Keycloak's management health endpoint so it's reachable via the
        # internal CF route. Used by the CF http health check and by configure-idps.sh.
        location /health/ {
            proxy_pass http://127.0.0.1:9000/health/;
            proxy_set_header Host $http_host;
        }

        location / {
            proxy_pass http://127.0.0.1:8081;

            # --- X-Frame-Options fix ---
            # Strip Keycloak's X-Frame-Options: DENY and replace with SAMEORIGIN
            # so the admin console's authentication iframe works.
            proxy_hide_header X-Frame-Options;
            add_header X-Frame-Options "SAMEORIGIN" always;

            # --- Proxy headers ---
            # X-Forwarded-For, X-Forwarded-Proto, X-Forwarded-Host are NOT set
            # explicitly here. Nginx passes them through from the upstream proxy
            # (gorouter in cloud.gov sets X-Forwarded-Proto: https). Locally,
            # these headers are absent and Keycloak defaults to the connection
            # scheme (http), which is correct.
            proxy_set_header Host       $http_host;
            proxy_set_header X-Real-IP  $remote_addr;

            # Allow large headers (Keycloak tokens can be big)
            proxy_buffer_size        16k;
            proxy_buffers            4 16k;
            proxy_busy_buffers_size  32k;

            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }
    }
}
