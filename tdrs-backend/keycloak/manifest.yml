version: 1
applications:
  - name: keycloak
    memory: 768M
    disk_quota: 2G
    instances: 1
    health-check-type: process
    env:
      KC_DB: postgres
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    command: |
      DB_HOST=$(echo $VCAP_SERVICES | jq -r '."aws-rds"[0].credentials.host')
      DB_PORT=$(echo $VCAP_SERVICES | jq -r '."aws-rds"[0].credentials.port')
      DB_NAME=$(echo $VCAP_SERVICES | jq -r '."aws-rds"[0].credentials.db_name')
      DB_USER=$(echo $VCAP_SERVICES | jq -r '."aws-rds"[0].credentials.username')
      DB_PASS=$(echo $VCAP_SERVICES | jq -r '."aws-rds"[0].credentials.password')
      export KC_DB_URL="jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
      export KC_DB_USERNAME="${DB_USER}"
      export KC_DB_PASSWORD="${DB_PASS}"
      /opt/keycloak/entrypoint.sh start --import-realm --optimized
    docker:
      image: {{ keycloak_image }}
    services:
      - {{ rds_service }}
