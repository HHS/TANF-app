
location ~ ^/(v1|v2|admin|static/admin|static/dist|swagger|redocs|login|oidc|auth_check|logout) {
        limit_req zone=limitreqsbyaddr burst=20 nodelay;
        resolver 169.254.0.2;
        set $backend http://{{env "BACKEND_HOST"}}.apps.internal:8080$request_uri;
        proxy_pass $backend;
        proxy_pass_header x-csrftoken;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Origin $http_origin;

        proxy_connect_timeout 900;
        proxy_read_timeout    300;
        proxy_send_timeout    300;
        send_timeout 	      900;
        proxy_buffer_size     4k;
        proxy_temp_file_write_size 64k;

        limit_except GET HEAD POST PATCH { deny all;
        }

        add_header Access-Control-Allow-Origin 's3-fips.us-gov-west-1.amazonaws.com';
}

location /collect {
        set $faro http://{{env "BACKEND_HOST"}}.apps.internal:12346$request_uri;
        proxy_pass $faro;
        proxy_set_header   Host $host:3000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300;
        proxy_read_timeout    300;
        proxy_send_timeout    300;
        send_timeout          900;
        proxy_buffer_size     4k;
}


location /alerts/ {
        set $alerts http://alertmanager.apps.internal:8080$request_uri;
        proxy_pass $alerts;
        proxy_set_header   Host $host:3000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        proxy_connect_timeout 300;
        proxy_read_timeout    300;
        proxy_send_timeout    300;
        send_timeout          900;
        proxy_buffer_size     4k;
}

if ($request_method ~ ^(TRACE|OPTION)$) {
			return 405;
}

location = /profile {
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
}

location = /home {
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
}

location ^~ /data-files {
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
}

location ^~ /fra-data-files {
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
}

location = /login {
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
}

location = / {
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
}

error_page 500 502 504 /50x.html;

error_page 404 /index.html;
