version: "3"

tasks:
  gitcfg:
    desc: Configure git
    cmds:
      - git config core.hooksPath .githooks

  create-network:
    desc: Create the external network
    cmds:
      - (docker network create external-net) || true

  init-backend:
    desc: Initialize the backend project
    dir: tdrs-backend
    cmds:
      - task: create-network
      - docker compose -f docker-compose.yml up -d --build
      - docker compose -f docker-compose.yml exec web sh -c "python ./manage.py makemigrations"
      - docker compose -f docker-compose.yml exec web sh -c "python ./manage.py migrate"
      - docker compose -f docker-compose.yml down

  drop-db:
    desc: Drop the backend database
    dir: tdrs-backend
    cmds:
      - docker compose -f docker-compose.yml down
      - docker volume rm tdrs-backend_postgres_data

  backend-up:
    desc: Start backend web server
    dir: tdrs-backend
    cmds:
      - task: create-network
      - docker compose -f docker-compose.yml up -d

  backend-down:
    desc: Stop backend web server
    dir: tdrs-backend
    cmds:
      - docker compose -f docker-compose.yml down

  backend-logs:
    desc: Show and follow backend web server logs
    dir: tdrs-backend
    cmds:
      - docker compose -f docker-compose.yml logs -f

  backend-clean-db:
    desc: Drop and recreate the backend database (DEV ONLY – nukes all data)
    dir: tdrs-backend
    cmds:
      # 1) Drop DB volume + stop containers
      - task: drop-db

      # 2) Bring services back up (including web) on a fresh volume
      - docker compose -f docker-compose.yml up -d --build

      # 3) Apply all migrations to initialize the new database
      - docker compose -f docker-compose.yml exec web sh -c "python manage.py migrate"

  backend-restart:
    desc: Restart backend web server
    dir: tdrs-backend
    cmds:
      - docker compose -f docker-compose.yml restart

  backend-bash:
    desc: Open a shell in the backend container
    dir: tdrs-backend
    cmds:
      - docker compose -f docker-compose.yml exec web bash

  backend-shell:
    desc: Open a Django shell in the backend container
    dir: tdrs-backend
    cmds:
      - docker compose -f docker-compose.yml exec web sh -c "python ./manage.py shell_plus"

  backend-exec:
    desc: Execute a manage.py command in the backend container."
    dir: tdrs-backend
    vars:
      CMD: "{{.CMD}}"
    cmds:
      - docker compose -f docker-compose.yml exec web sh -c "python manage.py {{.CMD}}"

  backend-exec-seed-db:
    desc: Seed DB with initial data in the backend container
    dir: tdrs-backend
    vars:
      SEED_NUM: '{{.SEED_NUM | default "100"}}'
    cmds:
      - task: backend-up
      - docker compose -f docker-compose.yml exec web sh -c "python manage.py migrate && python manage.py populate_stts && python ./manage.py seed_records --clear --num {{.SEED_NUM}}"
      - docker compose -f docker-compose.yml down

  backend-makemigrations:
    desc: Run makemigrations in backend container
    dir: tdrs-backend
    cmds:
      - task: backend-up
      - docker compose -f docker-compose.yml exec web sh -c "python manage.py makemigrations"

  backend-migrate:
    desc: Run migrate in backend container
    dir: tdrs-backend
    cmds:
      - task: backend-up
      - docker compose -f docker-compose.yml exec web sh -c "python manage.py migrate"

  backend-update:
    desc: Rebuild backend image and apply migrations (no data wipe)
    dir: tdrs-backend
    cmds:
      - task: create-network
      - docker compose -f docker-compose.yml up -d --build
      - docker compose -f docker-compose.yml exec web sh -c "python manage.py migrate"

  backend-pytest:
    desc: 'Run pytest in the backend container. E.g: task backend-pytest PYTEST_ARGS="tdpservice/test/ -s -vv"'
    dir: tdrs-backend
    vars:
      PYTEST_ARGS: '{{.PYTEST_ARGS | default "."}}'
    cmds:
      - task: backend-up
      - docker compose -f docker-compose.yml exec web sh -c "pytest --basetemp=/home/tdpapp/ {{.PYTEST_ARGS}}"

  backend-pytest-go-integration:
    desc: 'Run the live Go parser integration suite. E.g: task backend-pytest-go-integration PYTEST_ARGS="-k section1 -vv"'
    dir: tdrs-backend
    vars:
      PYTEST_ARGS: '{{.PYTEST_ARGS | default ""}}'
    cmds:
      - task: create-network
      - |
        set -e
        db_name="tdrs_go_integration_$(date +%s)_$$"
        queue="go-parser-integration-$(date +%s)-$$"
        post_parse_queue="${queue}-post-parse"
        container="tdrs-backend-go-parser-integration-$(date +%s)-$$"

        cleanup() {
          docker rm -f "${container}" >/dev/null 2>&1 || true
          docker compose -f docker-compose.yml exec -T redis-server \
            redis-cli DEL "${queue}" "${post_parse_queue}" >/dev/null 2>&1 || true
          docker compose -f docker-compose.yml exec -T postgres \
            psql -U tdpuser -d postgres -v ON_ERROR_STOP=1 \
            -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = '${db_name}';" \
            -c "DROP DATABASE IF EXISTS \"${db_name}\";" >/dev/null 2>&1 || true
        }
        trap cleanup EXIT

        docker compose -f docker-compose.yml up -d postgres redis-server localstack web
        docker compose -f docker-compose.yml exec -T postgres sh -c 'until pg_isready -U tdpuser -d postgres; do sleep 1; done'
        docker compose -f docker-compose.yml exec -T postgres \
          psql -U tdpuser -d postgres -v ON_ERROR_STOP=1 \
          -c "CREATE DATABASE \"${db_name}\" OWNER tdpuser;"
        docker compose -f docker-compose.yml exec web sh -c "DB_NAME=${db_name} DJANGO_SETTINGS_MODULE=tdpservice.settings.go_parser_integration DJANGO_CONFIGURATION=GoParserIntegration python manage.py migrate --noinput"

        docker compose -f docker-compose.yml build go-parser
        docker compose -f docker-compose.yml run --rm --detach \
          --name "${container}" \
          -e DATABASE_URL="postgres://tdpuser:something_secure@postgres:5432/${db_name}?sslmode=disable" \
          -e GO_PARSER_SHADOW_MODE=false \
          -e GO_PARSER_QUEUE="${queue}" \
          -e GO_PARSER_POST_PARSE_QUEUE="${post_parse_queue}" \
          go-parser

        docker compose -f docker-compose.yml exec web sh -c "DB_NAME=${db_name} CELERY_GO_PARSER_QUEUE=${queue} DJANGO_SETTINGS_MODULE=tdpservice.settings.go_parser_integration DJANGO_CONFIGURATION=GoParserIntegration pytest -c pytest-go-parser.ini --basetemp=/home/tdpapp/ tdpservice/parsers/test/integration {{.PYTEST_ARGS}}"

  backend-pytest-go-integration-active:
    desc: 'Run Go parser integration tests against the active local DB and go-parser service. Faster, but not isolated. E.g: task backend-pytest-go-integration-active PYTEST_ARGS="-k section1 -vv"'
    dir: tdrs-backend
    vars:
      PYTEST_ARGS: '{{.PYTEST_ARGS | default ""}}'
      GO_PARSER_QUEUE: '{{.GO_PARSER_QUEUE | default "go-parser"}}'
    cmds:
      - task: create-network
      - |
        set -e
        queue="{{.GO_PARSER_QUEUE}}"

        GO_PARSER_QUEUE="${queue}" GO_PARSER_SHADOW_MODE=false \
          docker compose -f docker-compose.yml up -d postgres redis-server localstack celery web go-parser
        docker compose -f docker-compose.yml exec -T postgres sh -c 'until pg_isready -U tdpuser -d tdrs_test; do sleep 1; done'
        docker compose -f docker-compose.yml exec -T redis-server \
          redis-cli DEL "${queue}" >/dev/null

        docker compose -f docker-compose.yml exec web sh -c "CELERY_GO_PARSER_QUEUE=${queue} DJANGO_SETTINGS_MODULE=tdpservice.settings.go_parser_integration DJANGO_CONFIGURATION=GoParserIntegration pytest -c pytest-go-parser.ini --basetemp=/home/tdpapp/ tdpservice/parsers/test/integration {{.PYTEST_ARGS}}"

  backend-pytest-cov:
    desc: 'Generate coverage.json file in the backend container. E.g: task backend-pytest-cov PYTEST_ARGS="tdpservice/test/ -s -vv"'
    dir: tdrs-backend
    vars:
      PYTEST_ARGS: '{{.PYTEST_ARGS | default "."}}'
    cmds:
      - task: backend-up
      - docker compose -f docker-compose.yml exec web sh -c "pytest --cov=tdpservice --cov-report=json --basetemp=/home/tdpapp/ {{.PYTEST_ARGS}}"

  backend-remove-volumes:
    desc: Remove the backend volumes
    dir: tdrs-backend
    cmds:
      - docker compose -f docker-compose.yml down -v

  backend-lint:
    desc: Run flake8 in the backend container
    dir: tdrs-backend
    cmds:
      - task: backend-up
      - docker compose -f docker-compose.yml exec -T web sh -c "flake8 . && echo 'Flake8 linter found no issues'"

  backend-test-all:
    desc: Run backend linters and tests (flake8 + pytest)
    dir: tdrs-backend
    cmds:
      - task: backend-lint
      - task: backend-pytest

  backend-pip-lock:
    desc: Lock the pip dependencies (pipenv)
    dir: tdrs-backend
    cmds:
      - task: backend-up
      - docker compose -f docker-compose.yml exec web sh -c "pipenv lock"

  psql:
    desc: Open a psql shell in the backend postgres container
    dir: tdrs-backend
    cmds:
      - task create-network || true
      - docker compose -f docker-compose.yml up -d postgres
      - sleep 5
      - docker compose -f docker-compose.yml exec postgres sh -c "psql -U tdpuser -d tdrs_test"

  dump-parser-schema:
    desc: Dump selected parser table CREATE TABLE statements to parser schema.sql, including production and shadow tables
    vars:
      TABLE_PREFIX: '{{.TABLE_PREFIX | default ""}}'
    cmds:
      - |
        set -e

        table_prefix="{{.TABLE_PREFIX}}"
        table_prefix="${table_prefix:-shadow_}"
        schema_raw="$(mktemp)"
        schema_tmp="$(mktemp)"
        schema_shadow="$(mktemp)"
        schema_out="$(mktemp)"
        trap 'rm -f "$schema_raw" "$schema_tmp" "$schema_shadow" "$schema_out"' EXIT

        docker compose -f tdrs-backend/docker-compose.yml exec -T postgres pg_dump \
          -U tdpuser \
          -d tdrs_test \
          --schema-only \
          --section=pre-data \
          --no-owner \
          --no-privileges \
          --table=public.data_files_datafile \
          --table=public.stts_stt \
          --table=public.parser_error \
          --table=public.parsers_datafilesummary \
          --table=public.search_indexes_reparsemeta \
          --table=public.search_indexes_ssp_m1 \
          --table=public.search_indexes_ssp_m2 \
          --table=public.search_indexes_ssp_m3 \
          --table=public.search_indexes_ssp_m4 \
          --table=public.search_indexes_ssp_m5 \
          --table=public.search_indexes_ssp_m6 \
          --table=public.search_indexes_ssp_m7 \
          --table=public.search_indexes_tanf_t1 \
          --table=public.search_indexes_tanf_t2 \
          --table=public.search_indexes_tanf_t3 \
          --table=public.search_indexes_tanf_t4 \
          --table=public.search_indexes_tanf_t5 \
          --table=public.search_indexes_tanf_t6 \
          --table=public.search_indexes_tanf_t7 \
          --table=public.search_indexes_tribal_tanf_t1 \
          --table=public.search_indexes_tribal_tanf_t2 \
          --table=public.search_indexes_tribal_tanf_t3 \
          --table=public.search_indexes_tribal_tanf_t4 \
          --table=public.search_indexes_tribal_tanf_t5 \
          --table=public.search_indexes_tribal_tanf_t6 \
          --table=public.search_indexes_tribal_tanf_t7 \
          --table=public.search_indexes_programaudit_t1 \
          --table=public.search_indexes_programaudit_t2 \
          --table=public.search_indexes_programaudit_t3 \
          --table=public.search_indexes_tanf_exiter1 \
          > "$schema_raw"

        awk ' \
          /^SET / { next } \
          /^SELECT pg_catalog\.set_config\(/ { next } \
          { print } \
        ' "$schema_raw" > "$schema_tmp"

        perl -0ne 'while (/--\n-- Name: (?:data_files_datafile|parser_error|parsers_datafilesummary|search_indexes_(?:reparsemeta|ssp_m[1-7]|tanf_t[1-7]|tribal_tanf_t[1-7]|programaudit_t[1-3]|tanf_exiter1)); Type: TABLE;.*?\n--\n\nCREATE TABLE public\.(?:data_files_datafile|parser_error|parsers_datafilesummary|search_indexes_(?:reparsemeta|ssp_m[1-7]|tanf_t[1-7]|tribal_tanf_t[1-7]|programaudit_t[1-3]|tanf_exiter1)) \(.*?\n\);\n/sg) { print $& }' "$schema_tmp" > "$schema_shadow"
        if [ ! -s "$schema_shadow" ]; then
          echo "failed to extract parser-owned table definitions from schema dump" >&2
          exit 1
        fi

        {
          cat "$schema_tmp"
          TABLE_PREFIX="$table_prefix" perl -pe 'BEGIN { $prefix = $ENV{"TABLE_PREFIX"} || "shadow_" } s/(data_files_datafile|reports_reportfile|parser_error|parsers_datafilesummary|search_indexes_(?:reparsemeta|ssp_m[1-7]|tanf_t[1-7]|tribal_tanf_t[1-7]|programaudit_t[1-3]|tanf_exiter1))/${prefix}$1/g' "$schema_shadow"
        } > "$schema_out"

        mv "$schema_out" ./tdrs-services/parser/schema.sql

  clean:
    desc: Remove ALL containers, images, and volumes (DANGEROUS)
    cmds:
      - docker stop $(docker ps -aq) || true
      - docker rm $(docker ps -aq) || true
      - docker rmi $(docker images -q) || true
      - docker volume rm $(docker volume ls -q) || true

  clamav-up:
    desc: Start clamav service
    dir: tdrs-backend
    cmds:
      - docker compose -f docker-compose.yml up -d clamav-rest

  frontend-up:
    desc: Start frontend web server (nginx image)
    dir: tdrs-frontend
    cmds:
      - docker compose -f docker-compose.yml up -d

  frontend-down:
    desc: Stop frontend web server
    dir: tdrs-frontend
    cmds:
      - docker compose -f docker-compose.yml down

  frontend-logs:
    desc: Show and follow frontend web server logs
    dir: tdrs-frontend
    cmds:
      - docker compose -f docker-compose.yml logs -f

  frontend-restart:
    desc: Restart frontend web server
    dir: tdrs-frontend
    cmds:
      - docker compose -f docker-compose.yml restart

  frontend-bash:
    desc: Open a shell in the frontend container
    dir: tdrs-frontend
    cmds:
      - docker compose -f docker-compose.yml exec tdp-frontend sh

  frontend-av:
    desc: Start frontend with optional clamav service
    cmds:
      - task: frontend-up
      - task: clamav-up

  frontend-init:
    desc: Initialize the frontend project (localdev image with node_modules)
    dir: tdrs-frontend
    cmds:
      - docker compose -f docker-compose.local.yml up -d --build tdp-frontend
      - docker compose -f docker-compose.local.yml exec tdp-frontend sh -c "corepack prepare yarn@4.6.0 && corepack yarn install"
      - docker compose -f docker-compose.local.yml down

  frontend-install:
    desc: Install frontend dependencies on host (uses local Node)
    dir: tdrs-frontend
    cmds:
      - corepack prepare yarn@4.6.0 --activate && yarn install

  frontend-update:
    desc: Rebuild frontend localdev image and install dependencies (no data wipe)
    dir: tdrs-frontend
    cmds:
      - docker compose -f docker-compose.local.yml up -d --build tdp-frontend
      - docker compose -f docker-compose.local.yml exec tdp-frontend sh -c "corepack prepare yarn@4.6.0 && corepack yarn install"

  frontend-test-local:
    desc: Run frontend unit tests on host (watch-less)
    dir: tdrs-frontend
    cmds:
      - CI=true npm run test

  frontend-test-watch:
    desc: Run frontend unit tests on host (watch)
    dir: tdrs-frontend
    cmds:
      - npm run test

  frontend-test-cov-local:
    desc: Run frontend unit tests with coverage on host
    dir: tdrs-frontend
    cmds:
      - npm run test:cov

  frontend-test:
    desc: 'Run frontend unit tests in docker (watch-less). E.g: task frontend-test JEST_ARGS="--testPathPattern=FeedbackReports"'
    dir: tdrs-frontend
    vars:
      JEST_ARGS: '{{.JEST_ARGS | default ""}}'
    cmds:
      - docker compose -f docker-compose.local.yml up -d --build tdp-frontend-test
      - docker compose -f docker-compose.local.yml exec tdp-frontend-test sh -c "corepack prepare yarn@4.6.0 && corepack yarn install --mode=skip-build && CI=1 corepack yarn test --watchAll=false {{.JEST_ARGS}}"

  frontend-test-cov:
    desc: 'Run frontend unit tests with coverage in docker. E.g: task frontend-test-cov JEST_ARGS="--testPathPattern=FeedbackReports"'
    dir: tdrs-frontend
    vars:
      JEST_ARGS: '{{.JEST_ARGS | default ""}}'
    cmds:
      - docker compose -f docker-compose.local.yml up -d --build tdp-frontend-test
      - docker compose -f docker-compose.local.yml exec tdp-frontend-test sh -c "corepack prepare yarn@4.6.0 && corepack yarn install --mode=skip-build && corepack yarn test:cov {{.JEST_ARGS}}"

  frontend-lint:
    desc: Run eslint in the frontend test container
    dir: tdrs-frontend
    cmds:
      - docker compose -f docker-compose.local.yml up -d --build tdp-frontend-test --quiet-pull
      - docker compose -f docker-compose.local.yml exec -T tdp-frontend-test sh -c "corepack prepare yarn@4.6.0 && corepack yarn install --mode=skip-build && corepack yarn lint"

  # E2E / Cypress helpers

  e2e-env-var-setup:
    desc: Set up users and env vars for e2e test
    dir: tdrs-backend
    cmds:
      - export CYPRESS_TOKEN=local-cypress-token
      - docker compose -f docker-compose.yml exec web python manage.py delete_cypress_users -usernames new-cypress@teamraft.com cypress-admin@teamraft.com cypress-data-analyst-dana@teamraft.com cypress-fra-data-analyst-derek@teamraft.com cypress-data-analyst-donna@teamraft.com cypress-fra-data-analyst-david@teamraft.com cypress-fra-ofa-regional-staff-rachel@acf.hhs.gov cypress-fra-ofa-regional-staff-robert@acf.hhs.gov cypress-fra-ofa-regional-staff-rita@acf.hhs.gov cypress-fra-ofa-regional-staff-ryan@acf.hhs.gov
      - docker compose -f docker-compose.yml exec web python manage.py reset_cypress_profile_editing_users --allow-non-debug
      - docker compose -f docker-compose.yml exec web python manage.py loaddata cypress/users cypress/data_files cypress/regions cypress/profile_editing_regions cypress/profile_editing_users cypress/feature_flags

  frontend-e2e-local:
    desc: Run Cypress E2E tests locally (Cypress on host, app in docker)
    dir: tdrs-frontend
    cmds:
      - docker compose -f docker-compose.local.yml up -d --build tdp-frontend
      - |
        if command -v corepack >/dev/null 2>&1; then
          corepack prepare yarn@4.6.0 --activate && env -u ELECTRON_RUN_AS_NODE yarn test:e2e
        else
          env -u ELECTRON_RUN_AS_NODE npx --yes @yarnpkg/cli-dist@4.6.0 test:e2e
        fi

  frontend-e2e-ci-local:
    desc: Run Cypress E2E tests in command-line mode (headless, app in docker)
    dir: tdrs-frontend
    vars:
      CYPRESS_TOKEN: '{{.CYPRESS_TOKEN | default "local-cypress-token"}}'
    cmds:
      - task: backend-up
      - task: e2e-env-var-setup
      - docker compose -f docker-compose.local.yml up -d --build tdp-frontend
      - env -u ELECTRON_RUN_AS_NODE npx cypress verify || env -u ELECTRON_RUN_AS_NODE npx cypress install --force
      - |
        if command -v corepack >/dev/null 2>&1; then
          CYPRESS_TOKEN={{.CYPRESS_TOKEN}} env -u ELECTRON_RUN_AS_NODE yarn test:e2e-ci
        else
          CYPRESS_TOKEN={{.CYPRESS_TOKEN}} env -u ELECTRON_RUN_AS_NODE npx --yes @yarnpkg/cli-dist@4.6.0 test:e2e-ci
        fi

  frontend-e2e-cmd:
    desc: Run Cypress E2E tests headlessly from the command line (app in docker)
    dir: tdrs-frontend
    cmds:
      - docker compose -f docker-compose.yml up -d --build tdp-frontend
      - CYPRESS_TOKEN=${CYPRESS_TOKEN:-local-cypress-token} npm run test:e2e-ci

  k6:
    desc: Run k6 performance tests
    dir: performance-tests
    vars:
      SCRIPT: "{{.SCRIPT}}"
      CYPRESS_TOKEN: '{{.CYPRESS_TOKEN | default "local-cypress-token"}}'
      BASE_URL: '{{.BASE_URL | default "http://localhost:3000"}}'
      SCENARIO: "{{.SCENARIO}}"
    cmds:
      - k6 run -e BASE_URL={{.BASE_URL}} -e CYPRESS_TOKEN={{.CYPRESS_TOKEN}} -e SCENARIO={{.SCENARIO}} {{.SCRIPT}}

  up:
    desc: Start both frontend and backend web servers
    cmds:
      - task: backend-up
      - task: frontend-up

  update-deps:
    desc: Rebuild backend/frontend and apply dependency updates (no data wipe)
    cmds:
      - task: backend-update
      - task: frontend-update

  down:
    desc: Stop both frontend and backend web servers
    cmds:
      - task: backend-down
      - task: frontend-down

  create-infected-test-file:
    desc: Create a test file with a valid TANF header that ClamAV will flag as infected
    dir: tdrs-backend
    preconditions:
      - sh: docker compose ps clamav-rest --status running -q 2>/dev/null
        msg: "clamav-rest container is not running. Start it first with: task backend-up"
    cmds:
      - |
        printf 'HEADER20204A06   TAN1ED\nTDP-INFECTED-TEST-MARKER\nTRAILER0000001         \n' > infected_test.txt
      - >-
        docker compose exec -T clamav-rest sh -c
        'echo "TDP.Test.Infected:0:*:5444502d494e4645435445442d544553542d4d41524b4552" > /var/lib/clamav/tdp-test.ndb
        && pkill -USR2 clamd
        && sleep 5
        && tail -1 /var/log/clamav/clamd.log'
      - echo "Created tdrs-backend/infected_test.txt and loaded ClamAV test signature. Upload this file through the frontend to test AV rejection."

  parser:compile-check:
    desc: Compile all Go parser packages and tests
    dir: tdrs-services/parser
    cmds:
      - make compile-check

  parser:lint:
    desc: Run static analysis for the Go parser
    dir: tdrs-services/parser
    cmds:
      - make lint

  parser:sqlc-diff:
    desc: Verify sqlc generated code matches the parser schema and queries
    dir: tdrs-services/parser
    cmds:
      - |
        if ! make sqlc-diff; then
          echo ""
          echo "sqlc generated code is out of sync."
          echo "If model changes were made, update the definitions in:"
          echo "  - tdrs-services/parser/config/schemas"
          echo "  - tdrs-services/parser/internal/storage/writer"
          exit 1
        fi

  parser:sqlc-vet:
    desc: Run sqlc static analysis for the parser schema and queries
    dir: tdrs-services/parser
    cmds:
      - make sqlc-vet

  parser:sqlc-verify:
    desc: Verify parser SQL queries against the configured engine and schema
    dir: tdrs-services/parser
    cmds:
      - make sqlc-verify

  parser:validate-config:
    desc: Load parser config, compile validator expressions, and verify native executor coverage
    dir: tdrs-services/parser
    cmds:
      - make validate-config

  parser:test-all-coverage:
    desc: Run all Go parser tests with coverage
    dir: tdrs-services/parser
    cmds:
      - make test-all-coverage

  parser:coverage-report:
    desc: Generate readable Go parser coverage summary and HTML artifacts
    dir: tdrs-services/parser
    cmds:
      - make coverage-report

  parser:ci-checks:
    desc: Run the non-test CI checks for the Go parser
    dir: tdrs-services/parser
    cmds:
      - make ci-checks

  help:
    desc: Show this help message
    cmds:
      - task --list
